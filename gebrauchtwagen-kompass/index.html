const insOf = (v, pct, cov, insF) => Math.round(v.insBase * (pct / 100) * COVF[cov] * insF);
function annualOf(v, ins) {
  const fuel = (v.real / 100) * 6000 * v.fuelP;
  return Math.round(v.tax + v.service + fuel + ins);
}
function tcoOf(v, years, ins) { return v.priceNow + annualOf(v, ins) * years; }

// 0..1 Scores für die Gewichtung (a = jährliche Laufkosten inkl. Versicherung)
function scoreParts(v, a) {
  const maxBoot = 1740, cheapest = 1300;
  return {
    rel: v.rel / 5,
    cost: Math.max(0, Math.min(1, (1900 - a) / (1900 - cheapest))),
    quiet: v.quiet / 5,
    sleep: v.sleep / 5,
    boot: v.bootMax / maxBoot,
    budget: v.priceNow <= 14000 ? 1 - (v.priceNow / 14000) * 0.35 : 0.15,
  };
}

}

              <li><b style={{ color: C.ink }}>VW Golf Sportsvan & Octavia 3:</b> die <b>1.4/1.5 TSI</b> + <b>DSG7</b> sind die Restrisiken – Schaltgetriebe + Scheckheft sind sicherer als die Bestnoten suggerieren.</li>
              <li><b style={{ color: C.ink }}>Kein Kombi:</b> Fabia, Polo 6, A3 (8V Limo/Sportback), B-Klasse, Q2, T-Roc sind keine echten Lademeister – für „Schlafen + großer Kofferraum“ scheiden sie praktisch aus.</li>
              <li><b style={{ color: C.ink }}>Zuverlässigste ≠ deutsche Liste:</b> In ADAC-Pannen- und TÜV-Statistik liegen <b>Toyota/Honda</b> bei der Antriebs-Haltbarkeit regelmäßig vor den TSI-Modellen – die deutsche Liste misst v. a. HU-Mängel, nicht Motorschäden.</li>

            </ul>

        </details>

        <div style={{ fontSize: 11, color: C.faint, lineHeight: 1.6 }}>

    </div>

// Farbe aufhellen/abdunkeln
function shade(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  const cl = (x) => Math.max(0, Math.min(255, x));
  const r = cl((n >> 16) + amt), g = cl(((n >> 8) & 255) + amt), b = cl((n & 255) + amt);
  return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function CarSilhouette({ l, h, type, color, totalW, uid }) {
  const w = l * PXPM, ch = h * PXPM, ground = ROWH - 7, topY = ground - ch;
  const T = BODY[type];
  const r = (T.wd / 2) * PXPM, arch = r * 1.18;
  const fAx = T.foh * w, rAx = (1 - T.roh) * w, bottomY = ground - T.clr * PXPM;
  const noseY = topY + T.nose * ch, hoodY = topY + T.hood * ch, roofY = topY + T.roof * ch, beltY = topY + T.belt * ch;
  const cowlX = T.cowl * w, aTopX = T.aTop * w, reX = T.re * w, ttX = T.tt * w, bpX = T.bp * w;
  const fr = 0.006 * w, re = 0.994 * w, gTop = roofY + 0.02 * ch;

  let d = `M ${fr} ${bottomY} L ${fr} ${noseY}
    Q ${fr} ${hoodY} ${fr + 0.05 * w} ${hoodY}
    L ${cowlX} ${hoodY}
    C ${cowlX + 0.05 * w} ${hoodY} ${aTopX - 0.04 * w} ${roofY + 0.02 * ch} ${aTopX} ${roofY}
    L ${reX} ${roofY}`;
  if (T.rear === "vertical") {
    d += ` C ${reX + 0.05 * w} ${roofY} ${ttX} ${roofY + 0.05 * ch} ${ttX + 0.012 * w} ${beltY - 0.05 * ch}
      L ${re} ${beltY + 0.02 * ch} L ${re} ${bottomY}`;
  } else {
    d += ` C ${reX + 0.07 * w} ${roofY + 0.06 * ch} ${ttX} ${beltY - 0.07 * ch} ${re} ${beltY + 0.05 * ch}
      L ${re} ${bottomY}`;
  }
  d += ` L ${rAx + arch} ${bottomY} Q ${rAx} ${bottomY - arch * 1.12} ${rAx - arch} ${bottomY}
    L ${fAx + arch} ${bottomY} Q ${fAx} ${bottomY - arch * 1.12} ${fAx - arch} ${bottomY} Z`;

  const glass = T.rear === "vertical"
    ? `M ${cowlX + 0.03 * w} ${beltY} L ${aTopX + 0.025 * w} ${gTop} L ${reX - 0.015 * w} ${gTop} L ${ttX - 0.015 * w} ${beltY - 0.03 * ch} Z`
    : `M ${cowlX + 0.03 * w} ${beltY} L ${aTopX + 0.025 * w} ${gTop} L ${reX - 0.025 * w} ${gTop} C ${ttX - 0.025 * w} ${beltY - 0.05 * ch} ${ttX - 0.035 * w} ${beltY - 0.02 * ch} ${ttX - 0.06 * w} ${beltY} Z`;

  const gid = `bg-${uid}`, glid = `gl-${uid}`, wid = `wh-${uid}`;
  const light = shade(color, 48), dark = shade(color, -36), dark2 = shade(color, -18);
  const charY = beltY + (bottomY - beltY) * 0.42;
  const doorXs = [bpX, bpX + (reX - bpX) * 0.5];

  return (
    <svg width={totalW} height={ROWH} style={{ display: "block" }}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor={light} /><stop offset="0.5" stopColor={color} /><stop offset="1" stopColor={dark} />
        </linearGradient>
        <linearGradient id={glid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor="#E4F0F2" /><stop offset="1" stopColor="#A6BFC2" />
        </linearGradient>
        <radialGradient id={wid} cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stopColor="#566666" /><stop offset="0.6" stopColor="#2A3838" />
          <stop offset="0.64" stopColor="#0C1011" /><stop offset="1" stopColor="#0C1011" />
        </radialGradient>
      </defs>
      <ellipse cx={(fAx + rAx) / 2} cy={ground + 2} rx={w * 0.46} ry={4} fill="#000" opacity={0.28} />
      <line x1={0} y1={ground} x2={totalW} y2={ground} stroke={C.line} strokeWidth={1} />
      <path d={d} fill={`url(#${gid})`} stroke={dark} strokeWidth={1.1} strokeLinejoin="round" />
      <path d={`M ${fAx} ${charY} L ${rAx + arch * 0.4} ${charY - 0.5}`} stroke={dark} strokeWidth={1} opacity={0.5} fill="none" />
      {doorXs.map((dx, i) => (
        <line key={i} x1={dx} y1={beltY + 1} x2={dx} y2={bottomY - 2} stroke={dark} strokeWidth={0.8} opacity={0.45} />
      ))}
      <ellipse cx={fr + 0.022 * w} cy={noseY + (hoodY - noseY) * 0.45} rx={0.022 * w} ry={0.055 * ch} fill="#EAF2DE" opacity={0.85} />
      <rect x={re - 0.032 * w} y={beltY + 0.04 * ch} width={0.024 * w} height={0.1 * ch} rx={2} fill="#C8463A" opacity={0.92} />
      <path d={glass} fill={`url(#${glid})`} stroke={dark2} strokeWidth={0.7} />
      <line x1={bpX} y1={gTop + 1} x2={bpX} y2={beltY - 1} stroke={color} strokeWidth={2.4} />
      {[fAx, rAx].map((cx, i) => (
        <g key={i}>
          <circle cx={cx} cy={ground - r} r={r} fill={`url(#${wid})`} stroke="#070A0A" strokeWidth={1} />
          <circle cx={cx} cy={ground - r} r={r * 0.5} fill="#1A2525" stroke="#3A4A4A" strokeWidth={1} />
          {Array.from({ length: 5 }, (_, k) => {
            const a = (k / 5) * Math.PI * 2 - Math.PI / 2;
            return <line key={k} x1={cx} y1={ground - r} x2={cx + Math.cos(a) * r * 0.46} y2={ground - r + Math.sin(a) * r * 0.46} stroke="#8A9A9A" strokeWidth={1.6} />;
          })}
          <circle cx={cx} cy={ground - r} r={r * 0.14} fill="#A6B4B4" />
        </g>
      ))}
    </svg>
  );
}

function VolPair({ normal, folded }) {
  const k = 1.05, s = (v) => Math.sqrt(v) * k, W = 60, H = 50;
  const sn = s(normal), sf = s(folded);
  return (
    <svg width={W} height={H} style={{ flexShrink: 0 }}>
      <rect x={1} y={H - sf - 1} width={sf} height={sf} fill="none" stroke="#5B8FF9" strokeWidth={1.3} strokeDasharray="3 2" />
      <rect x={1} y={H - sn - 1} width={sn} height={sn} fill={C.eco} fillOpacity={0.5} stroke={C.eco} strokeWidth={1} />
    </svg>
  );
}

function SizeChart({ rows }) {
  const maxLen = Math.max(...rows.map((v) => v.l), 1);
  const totalSil = Math.round(maxLen * PXPM) + 6;
  return (
    <div className="panel scroll" style={{ padding: 0, marginBottom: 8 }}>
      <div style={{ minWidth: STK + totalSil + 8 }}>
        {rows.map((v) => (
          <div key={v.id} style={{ display: "flex", alignItems: "flex-end", borderBottom: `1px solid ${C.line}` }}>
            <div style={{ position: "sticky", left: 0, zIndex: 1, width: STK, background: C.panel, padding: "8px 10px", display: "flex", gap: 8, alignItems: "flex-end" }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 650, display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ width: 8, height: 8, borderRadius: 2, background: v.color, flexShrink: 0 }} />{v.short}
                </div>
                <div className="num" style={{ fontSize: 11, color: C.dim, marginTop: 3 }}>L {v.l.toFixed(2)} m · H {v.h.toFixed(2)} m</div>
                <div className="num" style={{ fontSize: 11, color: C.faint }}>{v.boot} / {v.bootMax} L</div>
              </div>
              <VolPair normal={v.boot} folded={v.bootMax} />
            </div>
            <CarSilhouette l={v.l} h={v.h} type={v.t} color={v.color} totalW={totalSil} uid={v.id} />
          </div>
        ))}
        <div style={{ display: "flex" }}>
          <div style={{ position: "sticky", left: 0, zIndex: 1, width: STK, background: C.panel, flexShrink: 0 }} />
          <svg width={totalSil} height={20}>
            {Array.from({ length: Math.ceil(maxLen) + 1 }, (_, m) => (
              <g key={m}>
                <line x1={m * PXPM} y1={0} x2={m * PXPM} y2={5} stroke={C.faint} />
                <text x={m * PXPM} y={16} fill={C.faint} fontSize={9} textAnchor="middle">{m} m</text>
              </g>
            ))}
          </svg>
        </div>
      </div>
    </div>
  );
}

      <polygon points="26,7 30,26 26,24 22,26" fill={C.needle} />
      <polygon points="26,45 30,26 26,28 22,26" fill={C.dim} />
