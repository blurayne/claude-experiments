  const fuel = v.real / 100 * 6000 * v.fuelP;

function tcoOf(v, years, ins) {
  return v.priceNow + annualOf(v, ins) * years;
}

function scoreParts(v, a, budget) {
  const maxBoot = 1740,
    cheapest = 1300;
  return {
    rel: v.rel / 5,
    cost: Math.max(0, Math.min(1, (1900 - a) / (1900 - cheapest))),
    quiet: v.quiet / 5,
    sleep: v.sleep / 5,
    boot: v.bootMax / maxBoot,
    budget: v.priceNow <= budget ? 1 - v.priceNow / budget * 0.35 : 0.15
  };
}
