name: Build microbes-overview

on:
  push:
    branches: [main]
    paths:
      # Trigger only on source-file changes; this workflow commits the
      # generated HTML/PDF back, and we don't want that commit to retrigger
      # the workflow into an infinite loop.
      - 'microbes-overview/*.py'
      - 'microbes-overview/requirements.txt'
      - '.github/workflows/microbes-overview.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: microbes-overview
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WeasyPrint system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 libpangoft2-1.0-0 \
            libharfbuzz0b libfontconfig1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: microbes-overview/requirements.txt

      - name: Install Python dependencies
        run: pip install -r microbes-overview/requirements.txt

      - name: Build HTML and PDF
        working-directory: microbes-overview
        run: python build.py

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add microbes-overview/microbes_*.html microbes-overview/microbes_*.pdf
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "ci(microbes-overview): rebuild HTML and PDF"
          git push
