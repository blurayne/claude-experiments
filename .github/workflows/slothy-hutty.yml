name: Build slothy-hutty

on:
  push:
    branches: [main]
    paths:
      # Trigger on source (.js) changes only. The job commits the regenerated
      # STL/3MF/OBJ/MTL/PNG artifacts back; those are not *.js, so they cannot
      # retrigger this workflow.
      - 'slothy-hutty/*.js'
      - '.github/workflows/slothy-hutty.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: slothy-hutty
  cancel-in-progress: false

jobs:
  build:
    # Skip the bot's own artifact commit to avoid a loop.
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate 3D-print artifacts
        working-directory: slothy-hutty
        run: node build.js

      - name: Commit regenerated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add slothy-hutty/slothy-hutty.stl slothy-hutty/slothy-hutty-color.stl \
                  slothy-hutty/slothy-hutty.3mf slothy-hutty/slothy-hutty.obj \
                  slothy-hutty/slothy-hutty.mtl slothy-hutty/slothy-hutty.png
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "ci(slothy-hutty): rebuild 3D-print artifacts"
          git push
