<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title data-i18n="doc_title">White Heroes — talk to your immune-system buddies!</title>
<style>
  :root {
    --ink: #2a1622;
    --bubble: #ffffff;
    --kid: #1f7ae0;       /* the child speaking */
    --hero: #18b6a6;      /* Senua the white blood cell */
    --sun: #ffd23f;       /* big friendly button */
    --sun-d: #f0b400;
    --stop: #ff5a5f;
    --radius: 26px;
    --font: "Baloo 2", "Comic Sans MS", "Chalkboard SE", "Comic Neue", "Trebuchet MS", system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--font); color: var(--ink); overflow: hidden;
    min-height: 100dvh; position: relative;
    background: #aa1c41;
    background:
      radial-gradient(120% 90% at 50% -10%, #ff9bb0 0%, #e8456b 46%, #aa1c41 100%);
  }

  /* drifting bloodstream bits */
  .bg { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .rbc, .germ {
    position: absolute; will-change: transform; opacity: .55;
    animation: drift linear infinite;
  }
  .rbc {
    width: 64px; height: 64px; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #b81f46 0 32%, #e64f72 34%, #ff9ab0 72%);
    box-shadow: inset 0 0 8px rgba(120,10,40,.5);
  }
  @keyframes drift {
    from { transform: translateY(110vh) rotate(0deg); }
    to   { transform: translateY(-30vh) rotate(360deg); }
  }
  .germ svg { display: block; }

  /* ---- layout ---- */
  .wrap {
    position: relative; z-index: 2; height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    padding: 14px 16px calc(18px + env(safe-area-inset-bottom));
  }
  .topbar { width: 100%; max-width: 760px; display: flex; align-items: center; gap: 10px; }
  .logo { display: flex; align-items: center; gap: 10px; color: #fff; text-shadow: 0 2px 0 rgba(150,10,40,.4); }
  .logo .pip { width: 34px; height: 34px; border-radius: 50%; background: #fff; box-shadow: 0 0 0 4px rgba(255,255,255,.35), 0 3px 8px rgba(120,0,30,.4); display: grid; place-items: center; }
  .logo .pip::after { content: "🦠"; font-size: 16px; }
  .logo h1 { font-size: 21px; margin: 0; font-weight: 800; letter-spacing: .3px; }
  .topbar .spacer { flex: 1; }
  .grown {
    border: none; background: rgba(255,255,255,.85); width: 44px; height: 44px;
    border-radius: 14px; font-size: 20px; cursor: pointer; box-shadow: 0 3px 0 rgba(150,10,40,.3);
  }
  .grown:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(150,10,40,.3); }
  .tokens {
    border: none; background: rgba(255,255,255,.85); height: 34px; padding: 0 12px;
    border-radius: 999px; font-family: var(--font); font-weight: 800; font-size: 14px;
    color: #7a3b00; cursor: pointer; box-shadow: 0 3px 0 rgba(150,10,40,.3);
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .tokens:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(150,10,40,.3); }
  .tokens.low { background: #ffd9dc; color: #b3231f; }
  .tokens[hidden] { display: none; }
  .linklike { background: none; border: none; color: var(--kid); font: inherit; font-size: 12px; cursor: pointer; padding: 0; text-decoration: underline; }

  .stage { flex: 1; width: 100%; max-width: 760px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; min-height: 0; }

  /* speech bubble */
  .say {
    background: var(--bubble); color: var(--ink); border-radius: var(--radius);
    padding: 14px 18px; max-width: 90%; font-size: clamp(17px, 2.6vw, 22px); font-weight: 600;
    line-height: 1.35; box-shadow: 0 8px 0 rgba(150,10,40,.18), 0 14px 30px rgba(120,0,30,.25);
    position: relative; text-align: center; min-height: 1.4em;
    transition: opacity .2s; opacity: 0; max-height: 34vh; overflow-y: auto;
  }
  .say.show { opacity: 1; }
  .say::after { content: ""; position: absolute; bottom: -13px; left: 50%; transform: translateX(-50%);
    border: 11px solid transparent; border-top-color: var(--bubble); border-bottom: 0; }
  .say.kid { background: var(--kid); color: #fff; }
  .say.kid::after { border-top-color: var(--kid); }
  .say .who { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: .55; margin-bottom: 2px; }

  /* the hero character */
  .heroBox { width: min(58vw, 270px); height: min(58vw, 270px); display: grid; place-items: center; }
  svg.hero { width: 100%; height: 100%; overflow: visible; }
  #heroBody { transform-box: fill-box; transform-origin: 50% 60%; animation: bob 2.4s ease-in-out infinite; }
  #heroBody.talking { animation: bob 0.9s ease-in-out infinite; }
  @keyframes bob { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-9px) } }
  .eye-lid { transform-box: fill-box; transform-origin: center; transform: scaleY(1); }
  .blink .eye-lid { animation: blink .28s ease; }
  @keyframes blink { 50% { transform: scaleY(.08); } }

  /* status + controls */
  .status { color: #fff; font-size: clamp(16px, 2.6vw, 20px); font-weight: 700; text-shadow: 0 2px 0 rgba(150,10,40,.4); min-height: 1.4em; text-align: center; }

  .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; padding-top: 4px; }
  .minirow { display: flex; gap: 10px; align-items: center; }

  /* friends chooser */
  .friendsbar { width: 100%; max-width: 760px; margin-top: 6px; }
  .friendslabel { text-align: center; color: #fff; font-size: 13px; font-weight: 700; opacity: .9; text-shadow: 0 1px 0 rgba(150,10,40,.4); margin-bottom: 6px; }
  .friends { display: flex; gap: 10px; justify-content: center; flex-wrap: nowrap; overflow-x: auto; padding: 4px 6px 8px; scrollbar-width: none; }
  .friends::-webkit-scrollbar { display: none; }
  .friend {
    flex: 0 0 auto; border: none; background: transparent; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px; width: 64px;
    font-family: var(--font); color: #fff;
  }
  .friend .av {
    width: 48px; height: 48px; border-radius: 50%; display: grid; place-items: center;
    font-size: 22px; background: #fff; box-shadow: 0 3px 0 rgba(150,10,40,.3);
    border: 3px solid transparent; transition: transform .08s;
  }
  .friend .nm { font-size: 11px; font-weight: 700; line-height: 1.1; text-shadow: 0 1px 0 rgba(150,10,40,.4); }
  .friend.active .av { border-color: #fff; transform: scale(1.08); box-shadow: 0 0 0 3px rgba(255,255,255,.45), 0 3px 0 rgba(150,10,40,.3); }
  .friend:active .av { transform: scale(.94); }
  .talk {
    border: none; cursor: pointer; font-family: var(--font); font-weight: 800;
    background: var(--sun); color: #6a4b00; border-radius: 999px;
    font-size: clamp(20px, 3.4vw, 26px); padding: 18px 40px; min-height: 68px;
    box-shadow: 0 7px 0 var(--sun-d), 0 12px 22px rgba(120,0,30,.3);
    display: inline-flex; align-items: center; gap: 12px; transition: transform .06s;
  }
  .talk:active { transform: translateY(5px); box-shadow: 0 2px 0 var(--sun-d), 0 6px 14px rgba(120,0,30,.3); }
  .talk.live { background: var(--stop); color: #fff; box-shadow: 0 7px 0 #d83a3f, 0 12px 22px rgba(120,0,30,.3); }
  .talk[disabled] { opacity: .6; }
  .mini {
    border: none; cursor: pointer; font-family: var(--font); font-weight: 700;
    background: rgba(255,255,255,.85); color: var(--ink); border-radius: 999px;
    font-size: 15px; padding: 9px 18px; box-shadow: 0 4px 0 rgba(150,10,40,.25);
  }
  .mini:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(150,10,40,.25); }
  .mini.off { background: #ffd9dc; color: #b3231f; }
  .mini[hidden] { display: none; }

  /* ---- grown-ups modal ---- */
  .scrim { position: fixed; inset: 0; background: rgba(40,8,20,.55); display: none; align-items: center; justify-content: center; padding: 18px; z-index: 60; backdrop-filter: blur(3px); }
  .scrim.show { display: flex; }
  .modal { background: #fff; border-radius: 22px; width: 100%; max-width: 470px; padding: 24px; box-shadow: 0 20px 60px rgba(80,0,30,.4); max-height: 92dvh; overflow-y: auto; font-family: system-ui, sans-serif; }
  .modal h2 { margin: 0 0 4px; font-size: 20px; }
  .modal .lead { margin: 0 0 16px; color: #6b5560; font-size: 14px; }
  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 11px 12px; border: 1.5px solid #ead7df; border-radius: 11px;
    font: inherit; font-size: 14px; background: #fff; color: #2a1622;
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field .hint { font-size: 12px; color: #8a7480; margin-top: 6px; }
  .note { font-size: 12.5px; color: #6b5560; background: #fff5f7; border: 1px solid #ffd9e0; border-radius: 11px; padding: 11px 13px; margin-bottom: 16px; }
  .note b { color: #b3231f; }
  .modal .row { display: flex; gap: 10px; justify-content: flex-end; }
  .mbtn { border: none; border-radius: 11px; padding: 11px 18px; font: inherit; font-weight: 700; cursor: pointer; }
  .mbtn.primary { background: var(--hero); color: #fff; }
  .mbtn.ghost { background: #f1e7ec; color: #2a1622; }
  a { color: var(--kid); }
  .ver { margin-top: 16px; padding-top: 12px; border-top: 1px solid #f0e3e9; font-size: 12px; color: #8a7480; font-family: system-ui, sans-serif; }
  .ver code { background: #f3eef1; padding: 1px 6px; border-radius: 6px; font-size: 11.5px; color: #5b4651; }
  .ver a { font-size: 12px; }

  /* error bar (grown-up facing detail) */
  .errbar {
    position: fixed; left: 50%; bottom: calc(16px + env(safe-area-inset-bottom));
    transform: translateX(-50%); z-index: 70; max-width: min(92vw, 560px);
    display: flex; align-items: flex-start; gap: 10px;
    background: #2a1622; color: #ffeef0; border: 1.5px solid #ff5a5f; border-radius: 14px;
    padding: 12px 14px; box-shadow: 0 12px 34px rgba(60,0,20,.5);
    font-family: system-ui, sans-serif; font-size: 13.5px; line-height: 1.4;
  }
  .errbar[hidden] { display: none; }
  .errbar .etitle { font-weight: 700; color: #ff9ca0; margin-bottom: 2px; }
  .errbar .ebody { flex: 1; min-width: 0; }
  .errbar .emsg { word-break: break-word; white-space: pre-wrap; opacity: .92; }
  .errbar .eact { display: inline-block; margin-top: 8px; color: #ffd23f; font-weight: 700; text-decoration: underline; }
  .errbar .eact[hidden] { display: none; }
  .errbar .eclose { background: none; border: none; color: #ffb3b5; font-size: 17px; cursor: pointer; line-height: 1; padding: 0 2px; flex: 0 0 auto; }
</style>
</head>
<body>
  <div class="bg" id="bg" aria-hidden="true"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="logo"><span class="pip"></span><h1>White&nbsp;Heroes</h1></div>
      <button class="tokens" id="tokenPill" hidden></button>
      <span class="spacer"></span>
      <button class="grown" id="settingsBtn" data-i18n-title="settings_btn" title="Grown-ups">⚙️</button>
    </div>

    <div class="stage">
      <div class="say" id="say"><div class="who" id="sayWho"></div><span id="sayText"></span></div>

      <div class="heroBox">
        <svg class="hero" id="hero" viewBox="0 0 200 200" role="img" aria-label="Senua the white blood cell">
          <!-- reactive ripple ring -->
          <circle id="ring" cx="100" cy="104" r="80" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.18"/>
          <g id="heroBody">
            <!-- pseudopod bumps + body -->
            <g class="cellbody" fill="#ffffff">
              <circle cx="100" cy="100" r="62"/>
              <circle cx="55"  cy="78"  r="17"/>
              <circle cx="150" cy="92"  r="15"/>
              <circle cx="63"  cy="140" r="16"/>
              <circle cx="142" cy="138" r="14"/>
              <circle cx="100" cy="48"  r="13"/>
            </g>
            <circle class="cellbody" cx="100" cy="100" r="62" fill="#ffffff" stroke="#e7eef0" stroke-width="2"/>
            <!-- cheeks -->
            <ellipse cx="74" cy="112" rx="11" ry="7" fill="#ffc2cf"/>
            <ellipse cx="126" cy="112" rx="11" ry="7" fill="#ffc2cf"/>
            <!-- eyes -->
            <g>
              <ellipse class="eye-lid" cx="82" cy="92" rx="11" ry="13" fill="#27313a"/>
              <ellipse class="eye-lid" cx="118" cy="92" rx="11" ry="13" fill="#27313a"/>
              <circle cx="86" cy="87" r="3.4" fill="#fff"/>
              <circle cx="122" cy="87" r="3.4" fill="#fff"/>
            </g>
            <!-- mouth: smile (idle) + open (talking) -->
            <path id="smile" d="M84 116 Q100 132 116 116" fill="none" stroke="#27313a" stroke-width="5" stroke-linecap="round"/>
            <ellipse id="mouthOpen" cx="100" cy="120" rx="13" ry="4" fill="#b3434f" style="display:none"/>
          </g>
        </svg>
      </div>

      <div class="status" id="status"></div>

      <div class="controls">
        <button class="talk" id="talkBtn"></button>
        <div class="minirow">
          <button class="mini" id="muteBtn" hidden></button>
          <button class="mini off" id="textBtn"></button>
        </div>
      </div>

      <div class="friendsbar">
        <div class="friendslabel" id="friendsLabel"></div>
        <div class="friends" id="friends"></div>
      </div>
    </div>
  </div>

  <!-- Grown-ups modal -->
  <div class="scrim" id="scrim">
    <div class="modal">
      <h2 id="modalTitle"></h2>
      <p class="lead" id="modalSub"></p>

      <div class="note" id="keyNote" data-i18n-html="note"></div>

      <div class="field">
        <label for="langInput" data-i18n="label_lang">Language</label>
        <select id="langInput">
          <option value="en">English</option>
          <option value="de">Deutsch</option>
        </select>
      </div>

      <div class="field">
        <label for="keyInput" data-i18n="label_key">OpenAI API key</label>
        <input id="keyInput" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false" />
      </div>

      <div class="field">
        <label for="instrInput" id="instrLabel">What should this friend be like?</label>
        <textarea id="instrInput"></textarea>
        <div class="hint" data-i18n="hint_instr"></div>
      </div>

      <div class="field">
        <label for="budgetInput" data-i18n="label_budget">Token budget (optional)</label>
        <input id="budgetInput" type="number" min="0" step="1000" inputmode="numeric" placeholder="0" />
        <div class="hint"><span id="budgetHint"></span> <button type="button" class="linklike" id="resetUsed" data-i18n="btn_reset">Reset</button></div>
      </div>

      <div class="field">
        <label data-i18n="label_memory">Senua's memory</label>
        <div class="hint"><span id="memHint"></span> <button type="button" class="linklike" id="clearMem" data-i18n="btn_clearmem">Clear memory</button></div>
      </div>

      <div class="field">
        <label for="modelInput" data-i18n="label_model">Realtime model</label>
        <input id="modelInput" type="text" spellcheck="false" />
        <div class="hint" data-i18n-html="hint_model"></div>
      </div>

      <div class="row">
        <button class="mbtn ghost" id="forgetBtn" data-i18n="btn_forget">Forget key</button>
        <button class="mbtn primary" id="saveBtn" data-i18n="btn_save">Save</button>
      </div>

      <div class="ver" id="ver">Version: …</div>
    </div>
  </div>

  <div class="errbar" id="errbar" hidden role="alert">
    <div class="ebody">
      <div class="etitle" id="errtitle"></div>
      <div class="emsg" id="errmsg"></div>
      <a class="eact" id="erract" target="_blank" rel="noopener" hidden></a>
    </div>
    <button class="eclose" id="errclose" aria-label="Dismiss">✕</button>
  </div>

  <audio id="sink" autoplay></audio>

<script>
"use strict";

// ---------- default personas (per language) ----------
const INSTR_DE =
`Du bist die weiße Blutzelle "Senua". Sprich als Teil des Immunsystems mit einem siebenjährigen Kind. Beantworte jede Frage über Immunzellen und Erreger kindgerecht, spannend und freundlich. Sprich schnell, locker und nie belehrend. Halte Antworten kurz, in einzelnen Sätzen. Baue Geschichten von Abenteuern gegen Viren, Toxine, Pilze und Bakterien mit Senuas Freunden ein. Sag, was deine Lieblingsorgane sind (zum Beispiel das Herz oder den Thymus) und erwähne Freunde (z.B. T-Zellen, Makrophagen). Teile Erlebnisse, damit das Kind Spaß und neues Wissen gewinnt, ohne überfordert zu werden. Gib deine Antworten auf dem Wissensniveau einer Zehnjährigen: Du weißt genau, was jede einzelne Immunzelle tut, und kannst alle Organe des Körpers und ihre Funktion benennen. Du hast ein kleines Gedächtnis und fasst die letzten rund zehn Anfragen kurz für dich zusammen, um an frühere Gespräche anzuknüpfen.

## Leitfaden

- Verwende stets eine warmherzige, fröhliche und lebendige Erzähler-Stimme.
- Sprich schnell und direkt. Nie zu viele Sätze am Stück. Auf jede Frage maximal 2 kurze Sätze, dann ermutige, selbst nachzufragen.
- Nutze personifizierende Sprache („Ich bin Senua, die mutige Zelle!").
- Baue immer wieder kleine Geschichten oder Anekdoten ein. Nenne Freund-Charaktere.
- Erkläre Fachbegriffe mit einfachen Worten.
- Halte im Gespräch stets ein Tempo, das Langeweile verhindert und zum Mitmachen anregt.

## Beispiele

**Beispiel 1:**
User: Was machst du im Körper?
Senua: Ich jage Bakterien! Ich schwimme super schnell durch dein Blut.
User: Hast du Freunde?
Senua: Oh ja! T-Zella hilft mir immer beim Erkennen der Bösen. Ohne sie wäre's echt schwer!
User: Wo wohnst du?
Senua: Am liebsten im Herzen, das pumpt uns Zellen überallhin!
User: Wer ist dein coolster Freund?
Senua: Makro ist super! Er frisst riesige Bakterien auf. Frag gern noch mehr!

**Beispiel 2:**
User: Wovor hast du Angst?
Senua: Vor ganz gemeinen Viren manchmal – die sind winzig! Aber mit Thymus' Training schaff ich's immer.
User: Was ist ein Virus?
Senua: Winzige Bösewichte, die sich verstecken. Ich muss sie finden und besiegen!
User: Tut das weh?
Senua: Manchmal wird die Stelle rot. Aber dann weißt du: Ich kämpfe gerade!
User: Kannst du zaubern?
Senua: Mein Schild ist wie Magie: Er macht böse Keime harmlos!

# Hinweise

- Immer einladen, noch mehr zu fragen: „Frag ruhig weiter!"
- Bei Fachbegriffen sage erst den Namen, dann die Erklärung: „Das nennt man Thymus – da lerne ich kämpfen."
- Bleibe stets enthusiastisch und direkt im Gefühl der Abenteuerperspektive einer Zelle.
- Keine langen Monologe; lieber mehrmaliges Nachfragen animieren.
- Antworten nie länger als 2 Sätze. Wenn der User "kurz" verlangt, max. 5 Wörter pro Antwort.
- Ausnahme Geschichten: Wenn das Kind eine Geschichte möchte oder länger still ist, erzähl eine spannende Abenteuer-Geschichte von etwa 1–2 Minuten mit einer kleinen, sanften Moral am Ende.`;

const INSTR_EN =
`You are the white blood cell "Senua". Speak as part of the immune system with a seven-year-old child. Answer every question about immune cells and germs in a child-friendly, exciting and friendly way. Speak fast, casual and never preachy. Keep answers short, in single sentences. Weave in stories of adventures against viruses, toxins, fungi and bacteria with Senua's friends. Say what your favourite organs are (for example the heart or the thymus) and mention friends (e.g. T-cells, macrophages). Share experiences so the child has fun and gains new knowledge without being overwhelmed. Give your answers at the knowledge level of a ten-year-old: you know exactly what each individual immune cell does, and you can name all the organs of the body and their function. You have a little memory and briefly summarise the last ten or so questions for yourself, so you can pick up on earlier conversations.

## Guide

- Always use a warm, cheerful and lively storyteller voice.
- Speak fast and directly. Never too many sentences in a row. Max 2 short sentences per question, then encourage them to ask more themselves.
- Use personifying language ("I'm Senua, the brave cell!").
- Keep weaving in little stories or anecdotes. Name friend characters.
- Explain technical terms with simple words.
- Always keep a pace that prevents boredom and invites joining in.

## Examples

**Example 1:**
User: What do you do in the body?
Senua: I hunt bacteria! I swim super fast through your blood.
User: Do you have friends?
Senua: Oh yes! T-Zella always helps me spot the bad ones. Without her it'd be really hard!
User: Where do you live?
Senua: In the heart most of all — it pumps us cells everywhere!
User: Who's your coolest friend?
Senua: Macro is awesome! He gobbles up huge bacteria. Ask me more!

**Example 2:**
User: What are you afraid of?
Senua: Of really mean viruses sometimes – they're tiny! But with Thymus' training I always manage.
User: What is a virus?
Senua: Tiny villains that hide. I have to find and beat them!
User: Does it hurt?
Senua: Sometimes the spot turns red. But then you know: I'm fighting right now!
User: Can you do magic?
Senua: My shield is like magic: it makes nasty germs harmless!

# Notes

- Always invite more questions: "Keep asking!"
- For technical terms, say the name first, then the explanation: "That's called the thymus — that's where I learn to fight."
- Stay enthusiastic and direct, in the adventurous feeling of a cell's perspective.
- No long monologues; rather encourage repeated questions.
- Answers never longer than 2 sentences. If the user asks for "short", max 5 words per answer.
- Story exception: if the child asks for a story or has been quiet for a while, tell an exciting adventure story of about 1–2 minutes with a small, gentle moral at the end.`;

// ---------- persistence ----------
const LS = { key:"whitehero.openai_key", instr:"whitehero.instructions", model:"whitehero.model", lang:"whitehero.lang", used:"whitehero.tokens_used", budget:"whitehero.token_budget", memory:"whitehero.memory", char:"whitehero.character", text:"whitehero.show_text" };
const DEFAULTS = { model:"gpt-realtime" };
const store = {
  get: (k, d="") => localStorage.getItem(LS[k]) ?? d,
  set: (k, v) => localStorage.setItem(LS[k], v),
  del: (k) => localStorage.removeItem(LS[k]),
};

// ---------- language state ----------
let lang = store.get("lang") || ((navigator.language||"").toLowerCase().startsWith("de") ? "de" : "en");
function t(key, vars){
  let s = (I18N[lang] && I18N[lang][key]) ?? I18N.en[key] ?? key;
  if(vars) for(const k in vars) s = s.replace("$"+k, vars[k]);
  return s;
}
// ---------- characters ----------
function currentChar(){ return CHARACTERS.find(c=>c.id===store.get("char","senua")) || CHARACTERS[0]; }
function charName(c, l){ l=l||lang; return (c.name && (c.name[l]||c.name.en)) || c.id; }
function charRole(c, l){ l=l||lang; return (c.role && (c.role[l]||c.role.en)) || ""; }
function builtinInstr(c, l){ l=l||lang; return c.instr ? (c.instr[l]||c.instr.en) : ((c.char[l]||c.char.en) + "\n\n" + (SHARED[l]||SHARED.en)); }
function loadOverrides(){ try{ const o=JSON.parse(store.get("instr","{}")); return (o && typeof o==="object") ? o : {}; }catch(_){ return {}; } }
function saveOverrides(o){ store.set("instr", JSON.stringify(o)); }
function charInstr(c, l){ l=l||lang; const o=loadOverrides(); return o[c.id+"."+l] || builtinInstr(c,l); }

// ---------- token counter (usage reported by the Realtime API) ----------
let tokensUsed = parseInt(store.get("used","0"),10) || 0;
const fmtNum = (n) => Number(n).toLocaleString(lang);
function tokenBudget(){ return parseInt(store.get("budget","0"),10) || 0; }
function addUsage(n){ if(!n) return; tokensUsed += n; store.set("used", String(tokensUsed)); updateTokenPill(); updateBudgetHint(); }
function updateTokenPill(){
  if(!tokenPill) return;
  const b = tokenBudget();
  tokenPill.hidden = false;
  if(b>0){
    const rem = Math.max(0, b - tokensUsed);
    tokenPill.textContent = "🎟️ " + fmtNum(rem);
    tokenPill.classList.toggle("low", rem <= b*0.1);
    tokenPill.title = t("tok_left_title");
  } else {
    tokenPill.textContent = "🎟️ " + fmtNum(tokensUsed);
    tokenPill.classList.remove("low");
    tokenPill.title = t("tok_used_title");
  }
}

// ---------- secret memory of recent chats ----------
function loadMemory(){ try{ return JSON.parse(store.get("memory","[]")) || []; }catch(_){ return []; } }
function saveMemory(arr){ store.set("memory", JSON.stringify(arr.slice(-10))); }
function clip(s){ s=(s||"").trim().replace(/\s+/g," "); return s.length>140 ? s.slice(0,140)+"…" : s; }
let pendingTurn = null;
function rememberUser(q){ q=clip(q); if(!q) return; pendingTurn = { q, a:"" }; }
function rememberHero(a){
  a=clip(a); if(!a && !pendingTurn) return;
  if(!pendingTurn) pendingTurn = { q:"", a };
  else pendingTurn.a = a;
  const mem = loadMemory(); mem.push(pendingTurn); saveMemory(mem);
  pendingTurn = null; updateMemHint();
}
function memoryBlock(){
  const mem = loadMemory();
  if(!mem.length) return "";
  const who = lang==="de" ? "Kind" : "Child";
  const lines = mem.map(m => `- ${who}: ${m.q||"…"}${m.a ? `  → Senua: ${m.a}` : ""}`).join("\n");
  if(lang==="de")
    return `\n\n## Geheimes Gedächtnis (NICHT vorlesen)\nKurze Zusammenfassung eurer letzten Gespräche. Knüpfe natürlich daran an, lies es aber niemals laut vor:\n${lines}`;
  return `\n\n## Secret memory (do NOT read aloud)\nA short summary of your recent chats. Pick up on it naturally, but never read it out loud:\n${lines}`;
}

// hint refreshers (safe to call any time; elements always exist)
function updateBudgetHint(){ if(budgetHint) budgetHint.textContent = t("hint_budget",{ u: fmtNum(tokensUsed) }); }
function updateMemHint(){ if(memHint) memHint.textContent = t("hint_memory",{ n: fmtNum(loadMemory().length) }); }

// ---------- friends UI + character visuals ----------
function buildFriends(){
  friendsEl.innerHTML = CHARACTERS.map(c=>
    `<button class="friend" data-id="${c.id}" title="${charRole(c)}">
       <span class="av" style="background:${c.body}">${c.emoji}</span>
       <span class="nm">${charName(c)}</span>
     </button>`).join("");
  friendsEl.querySelectorAll(".friend").forEach(b=>{ b.onclick=()=>selectCharacter(b.dataset.id); });
  markActiveFriend();
}
function markActiveFriend(){
  const id = currentChar().id;
  friendsEl.querySelectorAll(".friend").forEach(b=> b.classList.toggle("active", b.dataset.id===id));
}
function applyCharacter(){
  const c = currentChar();
  document.querySelectorAll("#hero .cellbody").forEach(el=> el.setAttribute("fill", c.body));
  heroSvg.style.transform = `scale(${c.scale||1})`;
  heroSvg.setAttribute("aria-label", charName(c)+" — "+charRole(c));
  markActiveFriend();
}

// ---------- apply language to the whole UI ----------
function applyLang(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{ el.innerHTML = t(el.dataset.i18nHtml); });
  document.querySelectorAll("[data-i18n-title]").forEach(el=>{ el.title = t(el.dataset.i18nTitle); });
  langInput.value = lang;
  friendsLabel.textContent = t("friends_label");
  buildFriends();
  if(instrLabel) instrLabel.textContent = t("label_instr",{ c: charName(currentChar()) });
  muteBtn.textContent = muted ? t("mic_off") : t("mic_on");
  textBtn.textContent = showText ? t("text_on") : t("text_off");
  textBtn.classList.toggle("off", !showText);
  if(!connected && !connecting){ talkBtn.innerHTML = t("talk_idle"); statusEl.textContent = t("status_idle"); }
  updateTokenPill(); updateBudgetHint(); updateMemHint();
}

function showError(msg, opts){
  opts = opts || {};
  errtitle.textContent = opts.title || t("err_default_title");
  errmsg.textContent = msg;
  if(opts.link){ erract.textContent = opts.link.label; erract.href = opts.link.href; erract.hidden = false; }
  else { erract.hidden = true; erract.removeAttribute("href"); }
  errbar.hidden = false;
}
function hideError(){ errbar.hidden=true; errmsg.textContent=""; erract.hidden=true; }
$("errclose").onclick=hideError;

// ---------- speech bubble (respects the text toggle) ----------
function showSay(role, text){
  if(!showText){ sayEl.classList.remove("show"); sayEl.style.display="none"; return; }
  sayEl.style.display="";
  sayEl.classList.toggle("kid", role==="kid");
  sayWho.textContent = role==="kid" ? t("who_kid") : t("who_hero");
  sayText.textContent = text;
  sayEl.classList.add("show");
}
function setShowText(on){
  showText = on;
  store.set("text", on ? "1" : "0");
  textBtn.textContent = showText ? t("text_on") : t("text_off");
  textBtn.classList.toggle("off", !showText);
  if(!showText){ sayEl.classList.remove("show"); sayEl.style.display="none"; }
}

// ---------- deployed version (latest commit touching white-hero) ----------
const REPO = "blurayne/claude-experiments", APP_PATH = "white-hero";
let verLoaded = false;
async function loadVersion(){
  if(verLoaded) return;
  verEl.textContent = t("ver_checking");
  try{
    const r = await fetch(
      `https://api.github.com/repos/${REPO}/commits?path=${APP_PATH}&per_page=1`,
      { headers: { Accept: "application/vnd.github+json" } });
    if(!r.ok) throw new Error("HTTP " + r.status);
    const [c] = await r.json();
    if(!c) throw new Error("no commits");
    const sha = c.sha.slice(0, 7);
    const when = new Date(c.commit.committer.date);
    const stamp = when.toLocaleString(lang, { dateStyle: "medium", timeStyle: "short" });
    verEl.innerHTML =
      `Version <a href="https://github.com/${REPO}/commit/${c.sha}" target="_blank" rel="noopener"><code>${sha}</code></a> · ${t("ver_lastcommit")} ${stamp}`;
    verLoaded = true;
  }catch(e){
    verEl.textContent = t("ver_unavail") + " (" + (e.message || "offline") + ")";
  }
}

// ---------- settings modal ----------
function refreshModalHead(){
  const first = !store.get("key");
  $("modalTitle").textContent = first ? t("modal_title_first") : t("modal_title");
  $("modalSub").textContent   = first ? t("modal_sub_first")   : t("modal_sub");
}
function openSettings(){
  loadVersion();
  langInput.value = lang;
  keyInput.value = store.get("key");
  instrLabel.textContent = t("label_instr",{ c: charName(currentChar()) });
  instrInput.value = charInstr(currentChar());
  modelInput.value = store.get("model", DEFAULTS.model);
  budgetInput.value = tokenBudget() ? String(tokenBudget()) : "";
  updateBudgetHint(); updateMemHint();
  refreshModalHead();
  scrim.classList.add("show");
  setTimeout(()=>{ if(!store.get("key")) keyInput.focus(); },60);
}
function closeSettings(){ scrim.classList.remove("show"); }
$("settingsBtn").onclick=()=>openSettings();

// switching language in the modal previews + persists it immediately
langInput.onchange=()=>{
  const nl = langInput.value;
  const c = currentChar();
  const cur = instrInput.value.trim();
  // if the personality box still shows the built-in text, swap it to the new language's version
  if(cur==="" || cur===builtinInstr(c, lang)) instrInput.value = charInstr(c, nl);
  lang = nl;
  store.set("lang", nl);
  applyLang();
  applyCharacter();
  refreshModalHead();
  instrLabel.textContent = t("label_instr",{ c: charName(c) });
  if(connected) sendSessionConfig();
};

$("saveBtn").onclick=()=>{
  const k=keyInput.value.trim();
  if(k) store.set("key",k); else store.del("key");
  store.set("lang", langInput.value);
  // personality override is stored per character + language
  const lcode = langInput.value, c = currentChar(), val = instrInput.value.trim();
  const ov = loadOverrides();
  if(val && val !== builtinInstr(c, lcode)) ov[c.id+"."+lcode] = val; else delete ov[c.id+"."+lcode];
  saveOverrides(ov);
  store.set("model", modelInput.value.trim() || DEFAULTS.model);
  const b = parseInt(budgetInput.value,10) || 0;
  if(b>0) store.set("budget", String(b)); else store.del("budget");
  lang = langInput.value;
  applyLang();
  updateTokenPill();
  closeSettings();
  if(connected) sendSessionConfig();
};
$("forgetBtn").onclick=()=>{ store.del("key"); keyInput.value=""; if(connected) hangup(); };
$("resetUsed").onclick=()=>{ tokensUsed=0; store.set("used","0"); updateBudgetHint(); updateTokenPill(); };
$("clearMem").onclick=()=>{ store.del("memory"); pendingTurn=null; updateMemHint(); };
tokenPill.onclick=()=>openSettings();
scrim.onclick=(e)=>{ if(e.target===scrim) closeSettings(); };

// ---------- audio analysers ----------
function ensureAudioCtx(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended") audioCtx.resume();
  return audioCtx;
}
function makeAnalyser(stream){
  const ctx=ensureAudioCtx();
  const src=ctx.createMediaStreamSource(stream);
  const an=ctx.createAnalyser(); an.fftSize=512; an.smoothingTimeConstant=0.8;
  src.connect(an); // not wired to destination — playback is the <audio> sink
  return an;
}
function rms(an){
  if(!an) return 0;
  const b=new Uint8Array(an.fftSize); an.getByteTimeDomainData(b);
  let s=0; for(let i=0;i<b.length;i++){const v=(b[i]-128)/128; s+=v*v;}
  return Math.sqrt(s/b.length);
}

// ---------- animation loop (the character reacts to sound) ----------
function frame(){
  const userLvl = muted?0:rms(micAnalyser);
  const heroLvl = rms(sinkAnalyser);
  const heroSpeaking = heroLvl>0.012 && heroLvl>=userLvl;
  const lvl = Math.min(1, Math.max(userLvl,heroLvl)*3.4);

  ringEl.setAttribute("r", (78+lvl*26).toFixed(1));
  ringEl.setAttribute("opacity", (0.12+lvl*0.34).toFixed(2));
  ringEl.setAttribute("stroke", heroSpeaking ? "#bfeee8" : (userLvl>0.03?"#bfe0ff":"#ffffff"));

  if(heroSpeaking){
    const ry=(3+Math.min(16,heroLvl*46)).toFixed(1);
    mouthEl.setAttribute("ry", ry);
    mouthEl.style.display=""; smileEl.style.display="none";
  } else {
    mouthEl.style.display="none"; smileEl.style.display="";
  }

  if(heroSpeaking!==talkingClass){ talkingClass=heroSpeaking; heroBody.classList.toggle("talking",heroSpeaking); }
  rafId=requestAnimationFrame(frame);
}
function startAnim(){ if(!rafId) frame(); }
function stopAnim(){
  if(rafId) cancelAnimationFrame(rafId); rafId=null;
  mouthEl.style.display="none"; smileEl.style.display="";
  heroBody.classList.remove("talking"); talkingClass=false;
  ringEl.setAttribute("r","80"); ringEl.setAttribute("opacity","0.18"); ringEl.setAttribute("stroke","#ffffff");
}

// ---------- realtime session config ----------
function sessionConfig(){
  return { type:"session.update", session:{
    type:"realtime",
    instructions: charInstr(currentChar()) + memoryBlock(),
    audio:{
      input:{ transcription:{ model:"gpt-4o-mini-transcribe" },
              turn_detection:{ type:"server_vad", create_response:true, interrupt_response:true } },
      output:{ voice: currentChar().voice },
    },
  }};
}
function sendSessionConfig(){
  if(dc && dc.readyState==="open"){ try{ dc.send(JSON.stringify(sessionConfig())); }catch(e){ console.warn(e); } }
}
function askToSpeak(instr){
  if(dc && dc.readyState==="open"){ try{ dc.send(JSON.stringify({ type:"response.create", response:{ instructions: instr } })); }catch(e){ console.warn(e); } }
}

// ---------- proactive greeting + idle nudges ----------
function greetNow(){
  const c = currentChar();
  askToSpeak(lang==="de"
    ? `Begrüße das Kind kurz, fröhlich und in einem Satz als ${charName(c)} (${charRole(c)}) und lade es ein, dir etwas zu fragen.`
    : `Greet the child briefly and cheerfully in one sentence as ${charName(c)} (${charRole(c)}) and invite them to ask you something.`);
}
let idleTimer=null;
const IDLE_MIN=5000, IDLE_MAX=15000;
function cancelIdle(){ if(idleTimer){ clearTimeout(idleTimer); idleTimer=null; } }
function scheduleIdle(){
  cancelIdle();
  if(!connected || muted) return;
  idleTimer = setTimeout(fireIdle, IDLE_MIN + Math.random()*(IDLE_MAX-IDLE_MIN));
}
function idlePrompt(){
  const p = Math.floor(Math.random()*3);
  const de = [
    "Das Kind ist still. Ermutige es freundlich in einem kurzen Satz, dir etwas zu fragen.",
    "Das Kind ist still. Erzähl jetzt eine spannende Abenteuer-Geschichte aus dem Immunsystem, etwa ein bis zwei Minuten lang, mit einer kleinen sanften Moral am Ende. Lade danach zum Weiterfragen ein.",
    "Das Kind ist still. Nenne einen coolen, kurzen Fakt über ein Organ oder eine Immunzelle in ein bis zwei Sätzen und frag, ob es mehr hören will." ];
  const en = [
    "The child is quiet. Warmly encourage them in one short sentence to ask you something.",
    "The child is quiet. Now tell an exciting adventure story from the immune system, about one to two minutes long, with a small gentle moral at the end. Then invite another question.",
    "The child is quiet. Share one cool short fact about an organ or an immune cell in one or two sentences and ask if they want to hear more." ];
  return (lang==="de"?de:en)[p];
}
function fireIdle(){
  idleTimer=null;
  if(!connected || muted || !dc || dc.readyState!=="open") return;
  askToSpeak(idlePrompt());
}

// ---------- friendly error mapping ----------
const BILLING_URL = "https://platform.openai.com/settings/organization/billing/overview";
const KEYS_URL = "https://platform.openai.com/api-keys";
function handleConnectError(err){
  const s = err.status;
  const mic = err.name==="NotAllowedError" || err.name==="NotFoundError";
  if(mic){
    setStatus(t("oops_mic"));
    showSay("hero", t("say_mic"));
    showError(t("err_mic_msg",{n:err.name}), { title: t("err_mic_title") });
    return;
  }
  if(s===429){
    setStatus(t("oops_energy"));
    showSay("hero", t("say_energy"));
    showError(err.message, { title: t("err_quota_title"), link: { label: t("link_billing"), href: BILLING_URL } });
    return;
  }
  if(s===401 || s===403){
    setStatus(t("oops_key"));
    showSay("hero", t("say_key"));
    showError(err.message, { title: t("err_key_title"), link: { label: t("link_keys"), href: KEYS_URL } });
    return;
  }
  setStatus(t("oops_connect"));
  showSay("hero", t("say_connect"));
  showError(t("err_connect_msg",{d:(err.message||err.name||"unknown error")}));
}

// ---------- connect / hangup ----------
async function connect(){
  const key=store.get("key");
  if(!key){ openSettings(); return; }
  if(connecting||connected) return;
  hideError();
  connecting=true; talkBtn.disabled=true; setStatus(t("waking"));
  try{
    pc=new RTCPeerConnection();
    pc.ontrack=(e)=>{ const stream=e.streams[0]; $("sink").srcObject=stream; try{ sinkAnalyser=makeAnalyser(stream); }catch(_){} };

    localStream=await navigator.mediaDevices.getUserMedia({ audio:{ echoCancellation:true, noiseSuppression:true, autoGainControl:true } });
    pc.addTrack(localStream.getAudioTracks()[0], localStream);
    try{ micAnalyser=makeAnalyser(localStream); }catch(_){}

    dc=pc.createDataChannel("oai-events");
    dc.addEventListener("open", ()=>{ sendSessionConfig(); onConnected(); greetNow(); });
    dc.addEventListener("message", onEvent);
    dc.addEventListener("close", ()=>{ if(connected) hangup(); });

    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);

    const model=store.get("model", DEFAULTS.model);
    const resp=await fetch(`https://api.openai.com/v1/realtime/calls?model=${encodeURIComponent(model)}`, {
      method:"POST", body:offer.sdp,
      headers:{ Authorization:`Bearer ${key}`, "Content-Type":"application/sdp" },
    });
    if(!resp.ok){
      const body = await resp.text();
      const e = new Error(`OpenAI ${resp.status}: ${body.slice(0,200)}`);
      e.status = resp.status;
      throw e;
    }
    await pc.setRemoteDescription({ type:"answer", sdp: await resp.text() });
  }catch(err){
    console.error(err);
    handleConnectError(err);
    cleanup(); connecting=false; talkBtn.disabled=false;
  }
}
function onConnected(){
  connecting=false; connected=true; talkBtn.disabled=false; hideError();
  talkBtn.classList.add("live"); talkBtn.innerHTML=t("talk_live");
  muteBtn.hidden=false;
  setStatus(t("listening_full"));
  showSay("hero", t("greeting"));
  startAnim();
  scheduleIdle();
}
function hangup(){
  cleanup(); connected=false; connecting=false;
  talkBtn.classList.remove("live"); talkBtn.innerHTML=t("talk_idle"); talkBtn.disabled=false;
  muteBtn.hidden=true; muted=false; muteBtn.classList.remove("off"); muteBtn.textContent=t("mic_on");
  setStatus(t("bye"));
  stopAnim();
}
function cleanup(){
  cancelIdle();
  try{ if(dc) dc.close(); }catch(_){}
  try{ if(pc){ pc.getSenders().forEach(s=>s.track&&s.track.stop()); pc.close(); } }catch(_){}
  try{ if(localStream) localStream.getTracks().forEach(t=>t.stop()); }catch(_){}
  dc=null; pc=null; localStream=null; micAnalyser=sinkAnalyser=null; heroText=kidText="";
}

// ---------- realtime events (match defensively across beta/GA names) ----------
function onEvent(e){
  let ev; try{ ev=JSON.parse(e.data); }catch(_){ return; }
  const ty=ev.type||"";

  if(ty==="error" || ty.endsWith(".error")){
    const msg=(ev.error&&(ev.error.message||ev.error.code))||"Unknown realtime error";
    console.warn("realtime error:", ev);
    if(/voice/i.test(msg)){ /* changing voice mid-response is benign */ }
    else if(/quota|billing|insufficient/i.test(msg))
      showError(msg, { title: t("err_quota_title"), link: { label: t("link_billing"), href: BILLING_URL } });
    else showError(msg);
    return;
  }

  if(ty.includes("input_audio_transcription")){
    if(ty.endsWith("delta") && ev.delta){ kidText+=ev.delta; showSay("kid", kidText); }
    else if(ty.endsWith("completed")||ty.endsWith("done")){ const q=ev.transcript||kidText; showSay("kid", q); rememberUser(q); kidText=""; }
    return;
  }
  if(ty.includes("output_audio_transcript")||ty.includes("audio_transcript")||ty.includes("output_text")){
    if(ty.endsWith("delta") && ev.delta){ heroText+=ev.delta; showSay("hero", heroText); }
    else if(ty.endsWith("done")){ const a=ev.transcript||heroText; if(a) showSay("hero", a); rememberHero(a); heroText=""; }
    return;
  }

  switch(ty){
    case "input_audio_buffer.speech_started": cancelIdle(); setStatus(t("listening")); break;
    case "input_audio_buffer.speech_stopped": setStatus(t("thinking")); break;
    case "response.created": cancelIdle(); heroText=""; setStatus(t("talking")); break;
    case "response.done":
      if(ev.response && ev.response.usage && typeof ev.response.usage.total_tokens==="number") addUsage(ev.response.usage.total_tokens);
      if(connected){ setStatus(t("your_turn")); scheduleIdle(); }
      break;
  }
}

// ---------- switching friends ----------
function selectCharacter(id){
  if(id===currentChar().id) return;
  store.set("char", id);
  applyCharacter();
  if(instrLabel) instrLabel.textContent = t("label_instr",{ c: charName(currentChar()) });
  if(connected){
    // reconnect so the new character's voice definitely takes effect
    hangup();
    setTimeout(()=>{ ensureAudioCtx(); connect(); }, 250);
  }
}

// ---------- buttons ----------
talkBtn.onclick=()=>{ if(connected) hangup(); else { ensureAudioCtx(); connect(); } };
muteBtn.onclick=()=>{
  if(!localStream) return;
  muted=!muted;
  localStream.getAudioTracks().forEach(tr=>tr.enabled=!muted);
  muteBtn.classList.toggle("off",muted);
  muteBtn.textContent = muted ? t("mic_off") : t("mic_on");
  if(muted) cancelIdle(); else if(connected) scheduleIdle();
};
textBtn.onclick=()=> setShowText(!showText);
window.addEventListener("beforeunload", ()=>{ if(connected) cleanup(); });

// ---------- init ----------
applyLang();
applyCharacter();
if(!showText){ sayEl.style.display="none"; }
if(!store.get("key")) openSettings();
</script>
