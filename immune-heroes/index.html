<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title data-i18n="doc_title">Immune Heroes — talk to your immune-system buddies!</title>
<style>
  :root {
    --ink: #2a1622;
    --bubble: #ffffff;
    --kid: #1f7ae0;       /* the child speaking */
    --hero: #18b6a6;      /* Senua the white blood cell */
    --sun: #ffd23f;       /* big friendly button */
    --sun-d: #f0b400;
    --stop: #ff5a5f;
    --radius: 26px;
    --font: "Baloo 2", "Comic Sans MS", "Chalkboard SE", "Comic Neue", "Trebuchet MS", system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; overscroll-behavior: none; }
  body {
    font-family: var(--font); color: var(--ink); overflow: hidden;
    position: fixed; inset: 0;            /* single-page app: lock to the visible viewport, no page scroll/cutoff */
    touch-action: manipulation;          /* no double-tap zoom / tap-resize */
    background: #aa1c41;
    background:
      radial-gradient(120% 90% at 50% -10%, #ff9bb0 0%, #e8456b 46%, #aa1c41 100%);
  }
  /* never show scrollbars on the main screen (the settings modal may still scroll) */
  .wrap, .wrap * { scrollbar-width: none; -ms-overflow-style: none; }
  .wrap ::-webkit-scrollbar, .wrap::-webkit-scrollbar { width: 0; height: 0; display: none; }

  /* drifting bloodstream bits */
  .bg { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  /* background waveform / heartbeat visualiser */
  .wave { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
  .rbc, .germ {
    position: absolute; will-change: transform; opacity: .55;
    animation: drift linear infinite;
  }
  .rbc {
    width: 64px; height: 64px; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #b81f46 0 32%, #e64f72 34%, #ff9ab0 72%);
    box-shadow: inset 0 0 8px rgba(120,10,40,.5);
  }
  @keyframes drift {
    from { transform: translateY(110vh) rotate(0deg); }
    to   { transform: translateY(-30vh) rotate(360deg); }
  }
  .germ svg { display: block; }

  /* ---- layout ---- */
  .wrap {
    position: relative; z-index: 2; height: 100%;
    display: flex; flex-direction: column; align-items: center;
    padding: 14px 16px calc(18px + env(safe-area-inset-bottom));
  }
  .topbar { width: 100%; max-width: 760px; display: flex; align-items: center; gap: 10px; }
  .logo { display: flex; align-items: center; gap: 10px; color: #fff; text-shadow: 0 2px 0 rgba(150,10,40,.4); }
  .logo .pip { width: 34px; height: 34px; border-radius: 50%; background: #fff; box-shadow: 0 0 0 4px rgba(255,255,255,.35), 0 3px 8px rgba(120,0,30,.4); display: grid; place-items: center; }
  .logo .pip::after { content: "🦠"; font-size: 16px; }
  .logo h1 { font-size: 21px; margin: 0; font-weight: 800; letter-spacing: .3px; }
  .topbar .spacer { flex: 1; }
  .grown {
    border: none; background: rgba(255,255,255,.85); width: 44px; height: 44px;
    border-radius: 14px; font-size: 20px; cursor: pointer; box-shadow: 0 3px 0 rgba(150,10,40,.3);
  }
  .grown:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(150,10,40,.3); }
  .grown.off { background: #ffd9dc; }
  .grown[hidden] { display: none; }
  .tokens {
    border: none; background: rgba(255,255,255,.85); height: 34px; padding: 0 12px;
    border-radius: 999px; font-family: var(--font); font-weight: 800; font-size: 14px;
    color: #7a3b00; cursor: pointer; box-shadow: 0 3px 0 rgba(150,10,40,.3);
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .tokens:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(150,10,40,.3); }
  .tokens.low { background: #ffd9dc; color: #b3231f; }
  .tokens[hidden] { display: none; }
  .modelpill { font-size: 11px; font-weight: 700; color: #fff; opacity: .82; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-shadow: 0 1px 0 rgba(150,10,40,.4); cursor: pointer; }
  .linklike { background: none; border: none; color: var(--kid); font: inherit; font-size: 12px; cursor: pointer; padding: 0; text-decoration: underline; }
  /* tiny transcript on/off toggle, top-left of the bar */
  .textfab {
    border: none; cursor: pointer; width: 40px; height: 40px; border-radius: 13px;
    background: rgba(255,255,255,.85); color: var(--ink); font-size: 19px;
    box-shadow: 0 3px 0 rgba(150,10,40,.3); display: grid; place-items: center; line-height: 1;
  }
  .textfab:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(150,10,40,.3); }
  .textfab.off { opacity: .55; }

  .stage { position: relative; flex: 1; width: 100%; max-width: 760px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; min-height: 0; }
  /* team mode: teammates laid out around the hero in the action area */
  .teamlayer { position: absolute; inset: 0; z-index: 3; pointer-events: none; display: none; }
  .teamlayer.on { display: block; }
  .teammate { position: absolute; transform: translate(-50%,-50%); width: 54px; height: 54px; border-radius: 50%;
    display: grid; place-items: center; font-size: 26px; pointer-events: auto; cursor: grab; touch-action: none;
    box-shadow: 0 3px 5px rgba(120,0,30,.35), inset 0 7px 9px rgba(255,255,255,.5), inset 0 -8px 11px rgba(0,0,0,.22);
    border: 3px solid rgba(255,255,255,.7); transition: transform .15s ease, opacity .2s; }
  .teammate.speaking { animation: bob 0.9s ease-in-out infinite; box-shadow: 0 0 0 4px rgba(255,255,255,.5), 0 3px 5px rgba(120,0,30,.35); }
  .teamghost { position: fixed; width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center; font-size: 26px;
    pointer-events: none; z-index: 80; transform: translate(-50%,-50%); opacity: .9; box-shadow: 0 6px 16px rgba(120,0,30,.45); }

  /* speech bubble */
  .say {
    background: var(--bubble); color: var(--ink); border-radius: var(--radius);
    padding: 14px 18px; max-width: 90%; font-size: clamp(17px, 2.6vw, 22px); font-weight: 600;
    line-height: 1.35; box-shadow: 0 8px 0 rgba(150,10,40,.18), 0 14px 30px rgba(120,0,30,.25);
    position: relative; text-align: center; min-height: 1.4em;
    transition: opacity .2s; opacity: 0; max-height: 34vh; overflow-y: auto;
  }
  .say.show { opacity: 1; }
  .say::after { content: ""; position: absolute; bottom: -13px; left: 50%; transform: translateX(-50%);
    border: 11px solid transparent; border-top-color: var(--bubble); border-bottom: 0; }
  .say.kid { background: var(--kid); color: #fff; }
  .say.kid::after { border-top-color: var(--kid); }
  .say .who { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: .55; margin-bottom: 2px; }

  /* the hero character */
  .heroBox { width: min(58vw, 270px); height: min(58vw, 270px); display: grid; place-items: center; }
  svg.hero { width: 100%; height: 100%; overflow: visible; transition: transform .3s ease; }
  /* one continuous, gentle bob — never restarted (restarting on talk made the cell jump);
     "talking" is shown by a soft glow that fades in/out smoothly instead of a speed change */
  #heroBody { transform-box: fill-box; transform-origin: 50% 60%; animation: bob 2.8s ease-in-out infinite; transition: filter .3s ease; }
  #heroBody.talking { filter: drop-shadow(0 0 9px rgba(255,255,255,.55)); }
  @keyframes bob { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-7px) } }
  /* mouth: smile (idle) ↔ open (talking) cross-fade smoothly; the open mouth's ry is eased in JS */
  #smile, #mouthOpen { transition: opacity .22s ease; }
  .eye-lid { transform-box: fill-box; transform-origin: center; transform: scaleY(1); }
  .blink .eye-lid { animation: blink .28s ease; }
  @keyframes blink { 50% { transform: scaleY(.08); } }

  /* status + controls */
  /* spoken-text area: always reserve 5 lines so the layout never jumps; show the most recent lines */
  .status { color: #fff; font-size: clamp(16px, 2.6vw, 20px); font-weight: 700; line-height: 1.4;
    text-shadow: 0 2px 0 rgba(150,10,40,.4); height: 7em; min-height: 7em; text-align: center; max-width: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
  .status.live { justify-content: flex-end; max-width: 80vw; font-style: italic; }

  .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; padding-top: 4px; }
  .minirow { display: flex; gap: 10px; align-items: center; }

  /* friends chooser */
  .friendsbar { width: 100%; max-width: 760px; margin-top: auto; touch-action: none; }   /* sit at the bottom of the screen (wrap padding gives the gap) */
  /* the whole friends area handles its own drag — never let it pan/scroll the page (which would move the fixed background + speaking circle) */
  .friendsbar, .friendsbar * { touch-action: none; }
  .friendslabel { text-align: center; color: #fff; font-size: 13px; font-weight: 700; opacity: .9; text-shadow: 0 1px 0 rgba(150,10,40,.4); margin-bottom: 6px; }
  .friends { position: relative; display: flex; gap: 8px; justify-content: center; flex-wrap: nowrap; overflow: visible; padding: 24px 6px 6px; scrollbar-width: none; align-items: flex-end; transition: transform .24s cubic-bezier(.2,.85,.3,1); will-change: transform; touch-action: none; cursor: grab; }
  .friends:active { cursor: grabbing; }
  .friends::-webkit-scrollbar { display: none; }
  .friend {
    flex: 0 0 auto; border: none; background: transparent; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px; width: 60px;
    font-family: var(--font); color: #fff;
  }
  .friend .av {
    position: relative; overflow: hidden;
    width: 48px; height: 48px; border-radius: 50%; display: grid; place-items: center;
    font-size: 22px; background: #fff;
    /* drop shadow + spherical shading (top highlight, bottom shade) for a 3D ball look */
    box-shadow: 0 3px 5px rgba(120,0,30,.35), inset 0 7px 9px rgba(255,255,255,.55), inset 0 -8px 11px rgba(0,0,0,.22);
    border: 3px solid transparent;
    transform-origin: 50% 100%; transition: transform .14s cubic-bezier(.2,.85,.3,1);
    will-change: transform;
  }
  /* glossy specular highlight */
  .friend .av::after {
    content: ""; position: absolute; top: 12%; left: 22%; width: 42%; height: 30%;
    border-radius: 50%; background: radial-gradient(closest-side, rgba(255,255,255,.9), rgba(255,255,255,0));
    pointer-events: none;
  }
  .friend .nm { font-size: 11px; font-weight: 700; line-height: 1.1; text-shadow: 0 1px 0 rgba(150,10,40,.4); transition: opacity .14s; }
  /* the active friend keeps the white ring/glow; size comes from the Dock magnifier (JS) */
  .friend.active .av { border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,.5), 0 3px 0 rgba(150,10,40,.3); }
  .talk {
    border: none; cursor: pointer; font-family: var(--font); font-weight: 800;
    background: var(--sun); color: #6a4b00; border-radius: 999px;
    font-size: clamp(20px, 3.4vw, 26px); padding: 18px 40px; min-height: 68px;
    box-shadow: 0 7px 0 var(--sun-d), 0 12px 22px rgba(120,0,30,.3);
    display: inline-flex; align-items: center; gap: 12px; transition: transform .06s;
  }
  .talk:active { transform: translateY(5px); box-shadow: 0 2px 0 var(--sun-d), 0 6px 14px rgba(120,0,30,.3); }
  .talk.live { background: var(--stop); color: #fff; box-shadow: 0 7px 0 #d83a3f, 0 12px 22px rgba(120,0,30,.3); }
  .talk[disabled] { opacity: .6; }
  .mini {
    border: none; cursor: pointer; font-family: var(--font); font-weight: 700;
    background: rgba(255,255,255,.85); color: var(--ink); border-radius: 999px;
    font-size: 15px; padding: 9px 18px; box-shadow: 0 4px 0 rgba(150,10,40,.25);
  }
  .mini:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(150,10,40,.25); }
  .mini.off { background: #ffd9dc; color: #b3231f; }
  .mini[hidden] { display: none; }

  /* ---- grown-ups modal ---- */
  .scrim { position: fixed; inset: 0; background: rgba(40,8,20,.55); display: none; align-items: center; justify-content: center; padding: 18px; z-index: 60; backdrop-filter: blur(3px); }
  .scrim.show { display: flex; }
  #pwScrim, #overScrim { z-index: 70; }
  .pwmodal { max-width: 380px; }
  .pwerr { color: #b3231f; font-weight: 700; min-height: 1.1em; }
  .overmodal { max-width: 430px; text-align: center; }
  .overmodal .overEmoji { font-size: 52px; line-height: 1; margin-bottom: 6px; }
  .overmodal h2 { font-size: 22px; }
  .overmodal .lead { font-size: 15.5px; line-height: 1.5; color: #4a3640; }
  .modal { background: #fff; border-radius: 22px; width: 100%; max-width: 470px; padding: 24px; box-shadow: 0 20px 60px rgba(80,0,30,.4); max-height: 92dvh; overflow-y: auto; font-family: system-ui, sans-serif; }
  .modal h2 { margin: 0 0 4px; font-size: 20px; }
  .modal .lead { margin: 0 0 16px; color: #6b5560; font-size: 14px; }
  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 11px 12px; border: 1.5px solid #ead7df; border-radius: 11px;
    font: inherit; font-size: 14px; background: #fff; color: #2a1622;
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field .hint { font-size: 12px; color: #8a7480; margin-top: 6px; }
  .sharedbox { margin-top: 8px; }
  .sharedbox > summary { cursor: pointer; font-size: 12px; font-weight: 700; color: #6b5560; }
  .sharedbox #sharedInput { width: 100%; margin-top: 6px; min-height: 140px; }
  .note { font-size: 12.5px; color: #6b5560; background: #fff5f7; border: 1px solid #ffd9e0; border-radius: 11px; padding: 11px 13px; margin-bottom: 16px; }
  .note b { color: #b3231f; }
  .pgroup { display: none; }
  .pgroup.on { display: block; }
  .voicerow { display: flex; gap: 8px; }
  .voicerow input { flex: 1; }
  #voiceResults { width: 100%; }
  .modal .row { display: flex; gap: 10px; justify-content: flex-end; }
  .mbtn { border: none; border-radius: 11px; padding: 11px 18px; font: inherit; font-weight: 700; cursor: pointer; }
  .mbtn.primary { background: var(--hero); color: #fff; }
  .mbtn.ghost { background: #f1e7ec; color: #2a1622; }
  a { color: var(--kid); }
  .ver { margin-top: 16px; padding-top: 12px; border-top: 1px solid #f0e3e9; font-size: 12px; color: #8a7480; font-family: system-ui, sans-serif; }
  .ver code { background: #f3eef1; padding: 1px 6px; border-radius: 6px; font-size: 11.5px; color: #5b4651; }
  .ver a { font-size: 12px; }

  /* error bar (grown-up facing detail) */
  .errbar {
    position: fixed; left: 50%; bottom: calc(16px + env(safe-area-inset-bottom));
    transform: translateX(-50%); z-index: 70; max-width: min(92vw, 560px);
    display: flex; align-items: flex-start; gap: 10px;
    background: #2a1622; color: #ffeef0; border: 1.5px solid #ff5a5f; border-radius: 14px;
    padding: 12px 14px; box-shadow: 0 12px 34px rgba(60,0,20,.5);
    font-family: system-ui, sans-serif; font-size: 13.5px; line-height: 1.4;
  }
  .errbar[hidden] { display: none; }
  .errbar .etitle { font-weight: 700; color: #ff9ca0; margin-bottom: 2px; }
  .errbar .ebody { flex: 1; min-width: 0; }
  .errbar .emsg { word-break: break-word; white-space: pre-wrap; opacity: .92; }
  .errbar .eact { display: inline-block; margin-top: 8px; color: #ffd23f; font-weight: 700; text-decoration: underline; }
  .errbar .eact[hidden] { display: none; }
  .errbar .eclose { background: none; border: none; color: #ffb3b5; font-size: 17px; cursor: pointer; line-height: 1; padding: 0 2px; flex: 0 0 auto; }
</style>
</head>
<body>
  <div class="bg" id="bg" aria-hidden="true"></div>
  <canvas class="wave" id="wave" aria-hidden="true"></canvas>

  <div class="wrap">
    <div class="topbar">
      <button class="textfab off" id="textBtn" aria-label="Text">💬</button>
      <button class="textfab off" id="teamBtn" aria-label="Team mode" title="Team">👥</button>
      <span class="spacer"></span>
      <span class="modelpill" id="modelPill" title="Model"></span>
      <button class="tokens" id="tokenPill" hidden></button>
      <button class="grown off" id="muteBtn" hidden></button>
      <button class="grown" id="settingsBtn" data-i18n-title="settings_btn" title="Grown-ups">⚙️</button>
    </div>

    <div class="stage">
      <div class="say" id="say"><div class="who" id="sayWho"></div><span id="sayText"></span></div>
      <div class="teamlayer" id="teamLayer" aria-hidden="true"></div>

      <div class="heroBox">
        <svg class="hero" id="hero" viewBox="0 0 200 200" role="img" aria-label="Senua the white blood cell">
          <defs>
            <!-- spherical shading overlay: top-left highlight → edge shadow (3D look) -->
            <radialGradient id="sphere3d" cx="40%" cy="32%" r="72%">
              <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.55"/>
              <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
              <stop offset="100%" stop-color="#000000" stop-opacity="0.26"/>
            </radialGradient>
          </defs>
          <!-- ripple ring retired in favour of the background waveform -->
          <circle id="ring" cx="100" cy="104" r="80" fill="none" stroke="#ffffff" stroke-width="5" opacity="0"/>
          <g id="heroBody">
            <!-- pseudopod bumps + body -->
            <g class="cellbody" fill="#ffffff">
              <circle cx="100" cy="100" r="62"/>
              <circle cx="55"  cy="78"  r="17"/>
              <circle cx="150" cy="92"  r="15"/>
              <circle cx="63"  cy="140" r="16"/>
              <circle cx="142" cy="138" r="14"/>
              <circle cx="100" cy="48"  r="13"/>
            </g>
            <circle class="cellbody" cx="100" cy="100" r="62" fill="#ffffff" stroke="#e7eef0" stroke-width="2"/>
            <!-- 3D shading over the body (under the face) -->
            <circle cx="100" cy="100" r="62" fill="url(#sphere3d)" pointer-events="none"/>
            <!-- cheeks -->
            <ellipse cx="74" cy="112" rx="11" ry="7" fill="#ffc2cf"/>
            <ellipse cx="126" cy="112" rx="11" ry="7" fill="#ffc2cf"/>
            <!-- eyes -->
            <g>
              <ellipse class="eye-lid" cx="82" cy="92" rx="11" ry="13" fill="#27313a"/>
              <ellipse class="eye-lid" cx="118" cy="92" rx="11" ry="13" fill="#27313a"/>
              <circle cx="86" cy="87" r="3.4" fill="#fff"/>
              <circle cx="122" cy="87" r="3.4" fill="#fff"/>
            </g>
            <!-- mouth: smile (idle) + open (talking) -->
            <path id="smile" d="M84 116 Q100 132 116 116" fill="none" stroke="#27313a" stroke-width="5" stroke-linecap="round"/>
            <ellipse id="mouthOpen" cx="100" cy="120" rx="13" ry="4" fill="#b3434f" style="opacity:0"/>
          </g>
        </svg>
      </div>

      <div class="status" id="status"></div>

      <div class="controls">
        <button class="talk" id="talkBtn"></button>
      </div>
    </div>

    <div class="friendsbar">
      <div class="friends" id="friends"></div>
    </div>
  </div>

  <!-- Grown-ups modal -->
  <div class="scrim" id="scrim">
    <div class="modal">
      <h2 id="modalTitle"></h2>
      <p class="lead" id="modalSub"></p>

      <div class="note" id="keyNote" data-i18n-html="note"></div>

      <div class="field">
        <label for="langInput" data-i18n="label_lang">Language</label>
        <select id="langInput">
          <option value="en">English</option>
          <option value="de">Deutsch</option>
        </select>
      </div>

      <div class="field">
        <label for="providerInput" data-i18n="label_provider">AI provider</label>
        <select id="providerInput">
          <option value="openai">OpenAI Realtime</option>
          <option value="gemini">Google Gemini Live</option>
          <option value="elevenlabs">ElevenLabs (agent)</option>
        </select>
        <div class="hint" data-i18n="hint_provider"></div>
        <div class="hint" id="priceInfo"></div>
        <div class="hint" id="priceCheapest"></div>
      </div>

      <!-- OpenAI -->
      <div class="pgroup" data-prov="openai">
        <div class="field">
          <label for="keyInput" data-i18n="label_key">OpenAI API key</label>
          <input id="keyInput" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false" />
        </div>
        <div class="field">
          <label for="modelInput" data-i18n="label_model">Realtime model</label>
          <input id="modelInput" type="text" spellcheck="false" />
          <div class="hint" data-i18n-html="hint_model"></div>
        </div>
        <div class="field">
          <label for="vadInput" data-i18n="label_vad">Speech detection</label>
          <select id="vadInput">
            <option value="relaxed" data-i18n="vad_relaxed">Relaxed — waits for the child</option>
            <option value="balanced" data-i18n="vad_balanced">Balanced</option>
            <option value="quick" data-i18n="vad_quick">Quick — very responsive</option>
          </select>
          <div class="hint" data-i18n="hint_vad"></div>
        </div>
      </div>

      <!-- Gemini -->
      <div class="pgroup" data-prov="gemini">
        <div class="field">
          <label for="geminiKey" data-i18n="label_gemini_key">Google Gemini API key</label>
          <input id="geminiKey" type="password" placeholder="AIza..." autocomplete="off" spellcheck="false" />
          <div class="hint" data-i18n-html="hint_gemini_key"></div>
        </div>
        <div class="field">
          <label for="geminiModel" data-i18n="label_gemini_model">Gemini Live model</label>
          <div class="voicerow">
            <input id="geminiModel" type="text" spellcheck="false" />
            <button type="button" class="mbtn ghost" id="geminiListBtn" data-i18n="btn_listmodels">List models</button>
          </div>
          <select id="geminiModels" size="5" style="margin-top:8px; display:none;"></select>
          <div class="hint" id="geminiModelHint" data-i18n-html="hint_gemini_model_warn"></div>
        </div>
      </div>

      <!-- ElevenLabs -->
      <div class="pgroup" data-prov="elevenlabs">
        <div class="note" data-i18n-html="eleven_note"></div>
        <div class="field">

unsystem, Körper und allem was dazugehört – wie Ernährung, Bewegung, Spiel und Lernen.`;

  if(vars) for(const k in vars) s = s.replace("$"+k, vars[k]);

}

function charRole(c, l){ l=l||lang; return (c.role && (c.role[l]||c.role.en)) || ""; }
function builtinInstr(c, l){ l=l||lang; return (c.char[l]||c.char.en); }   // character-specific part only (shared rules added at runtime)
function loadOverrides(){ try{ const o=JSON.parse(store.get("instr","{}")); return (o && typeof o==="object") ? o : {}; }catch(_){ return {}; } }
function saveOverrides(o){ store.set("instr", JSON.stringify(o)); }
function charInstr(c, l){ l=l||lang; const o=loadOverrides(); return o[c.id+"."+l] || builtinInstr(c,l); }

let tokensUsed = parseInt(store.get("used","0"),10) || 0;
let costUsed = parseFloat(store.get("cost","0")) || 0;
const fmtNum = (n) => Number(n).toLocaleString(lang);
function fmtCost(c){ c=+c||0; if(c<=0) return "$0"; if(c<1) return "$"+c.toFixed(c<0.1?4:3); return "$"+c.toFixed(2); }
function tokenBudget(){ return parseInt(store.get("budget","0"),10) || 0; }

// Public list prices, USD per 1M tokens (audio dominates realtime cost). Rough, mid-2026 —
// shown only as an estimate. OpenAI gpt-realtime; Gemini Live (native audio); ElevenLabs per minute.
const PRICING = {
  openai:      { kind:"token",  textIn:4,   textOut:16,  audioIn:32, audioOut:64, cachedIn:0.40 },
  openai_mini: { kind:"token",  textIn:0.6, textOut:2.4, audioIn:10, audioOut:20, cachedIn:0.30 },
  gemini:      { kind:"token",  textIn:0.5, textOut:2,   audioIn:3,  audioOut:12, cachedIn:0.30 },
  elevenlabs:  { kind:"minute", perMin:0.10 },
};
function addUsage(n){ if(!n) return; tokensUsed += n; store.set("used", String(tokensUsed)); updateTokenPill(); updateBudgetHint(); }
function addCost(usd){ usd=+usd; if(!usd || usd<0) return; costUsed += usd; store.set("cost", costUsed.toFixed(6)); addDailyCost(usd); updateTokenPill(); updateBudgetHint(); checkDailyLimit(); }

// ---------- daily spending cap (client-side estimate, resets at local midnight) ----------
const DAILY_DEFAULT = 1;   // $ per day, changeable in settings
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function dailyLimit(){ const v=store.get("daily_limit",""); if(v==="") return DAILY_DEFAULT; const n=parseFloat(v); return isNaN(n)?DAILY_DEFAULT:n; }
function dailyCost(){ if(store.get("day_date","")!==todayStr()){ store.set("day_date",todayStr()); store.set("day_cost","0"); return 0; } return parseFloat(store.get("day_cost","0"))||0; }
function addDailyCost(usd){ const c=dailyCost()+(+usd||0); store.set("day_cost", c.toFixed(6)); }
function dailyLimitReached(){ const lim=dailyLimit(); return lim>0 && dailyCost() >= lim; }
// stop the session (if any) and tell the story that playtime is over
function checkDailyLimit(){
  if(!dailyLimitReached()) return false;
  if(connected||connecting) hangup();
  showTimesUp();
  return true;
}

// cost of one OpenAI Realtime response from its usage object (uses the audio/text split when present)
function costFromOpenAI(u){
  const P = /mini/i.test(store.get("model", DEFAULTS.model)) ? PRICING.openai_mini : PRICING.openai;
  const id=u.input_token_details||{}, od=u.output_token_details||{};
  let inAudio=id.audio_tokens, inText=id.text_tokens, cached=id.cached_tokens||0;
  let outAudio=od.audio_tokens, outText=od.text_tokens;
  if(inAudio==null && inText==null){ inAudio=u.input_tokens||0; inText=0; }
  if(outAudio==null && outText==null){ outAudio=u.output_tokens||0; outText=0; }
  const inAudioFull=Math.max(0,(inAudio||0)-cached);
  return (inAudioFull*P.audioIn + cached*P.cachedIn + (inText||0)*P.textIn + (outAudio||0)*P.audioOut + (outText||0)*P.textOut)/1e6;
}
// cumulative cost from a Gemini Live usageMetadata block
function costFromGemini(um){
  const P=PRICING.gemini;
  const pick=(arr,mod)=>(arr||[]).filter(d=>String(d.modality||"").toUpperCase()===mod).reduce((a,d)=>a+(d.tokenCount||0),0);
  let inA=pick(um.promptTokensDetails,"AUDIO"), inT=pick(um.promptTokensDetails,"TEXT");
  let outA=pick(um.responseTokensDetails,"AUDIO"), outT=pick(um.responseTokensDetails,"TEXT");
  if(!inA && !inT) inA=um.promptTokenCount||0;
  if(!outA && !outT) outA=um.responseTokenCount||0;
  return (inA*P.audioIn + inT*P.textIn + outA*P.audioOut + outT*P.textOut)/1e6;
}
// Gemini reports cumulative-per-session usage → accrue only the delta each time
let gemTokPrev=0, gemCostPrev=0;
function resetGeminiMeter(){ gemTokPrev=0; gemCostPrev=0; }
function accrueGemini(um){
  if(!um) return;
  const tot=um.totalTokenCount||((um.promptTokenCount||0)+(um.responseTokenCount||0));
  const cost=costFromGemini(um);
  let dT=tot-gemTokPrev; if(dT<0) dT=tot;
  let dC=cost-gemCostPrev; if(dC<0) dC=cost;
  gemTokPrev=tot; gemCostPrev=cost;
  if(dT>0) addUsage(dT);
  if(dC>0) addCost(dC);
}
// ElevenLabs is billed per minute (its own LLM/Claude billed separately) → meter the connected time
let elevenStart=0, elevenTick=null;
function elevenMinutes(){ return elevenStart ? (Date.now()-elevenStart)/60000 : 0; }
function elevenStartMeter(){ elevenStart=Date.now(); updateTokenPill(); elevenTick=setInterval(()=>{ updateTokenPill(); const lim=dailyLimit(); if(lim>0 && dailyCost()+elevenMinutes()*PRICING.elevenlabs.perMin >= lim){ elevenCommit(); checkDailyLimit(); } }, 3000); }
function elevenCommit(){ if(elevenStart){ const c=elevenMinutes()*PRICING.elevenlabs.perMin; elevenStart=0; addCost(c); } if(elevenTick){ clearInterval(elevenTick); elevenTick=null; } }

function updateTokenPill(){
  if(!tokenPill) return;
  tokenPill.hidden = false;
  let cost = costUsed;
  if(curProvider()==="elevenlabs") cost += elevenMinutes()*PRICING.elevenlabs.perMin;
  tokenPill.textContent = "≈ " + fmtCost(cost);   // pricing only — no token counts
  const lim = dailyLimit();
  tokenPill.classList.toggle("low", lim>0 && dailyCost() >= lim*0.85);
  tokenPill.title = t("cost_used_title") + (lim>0 ? "  ·  " + t("hint_daily",{ s:fmtCost(dailyCost()), l:fmtCost(lim) }) : "");
}
// the active "cell" tells the kids that playtime is over and they must go back to work
function showTimesUp(){
  if(!overScrim || overScrim.classList.contains("show")) return;
  overTitle.textContent = t("over_title");
  overStory.textContent = t("over_story",{ c: charName(currentChar()) });

  try{ speechSynthesis.cancel(); const ut=new SpeechSynthesisUtterance(overStory.textContent); ut.lang = lang==="de" ? "de-DE" : "en-US"; ut.rate=0.95; ut.pitch=1.12; speechSynthesis.speak(ut); }catch(_){}
}
function updateDailyHint(){ if(!dailyHint) return; const lim=dailyLimit(); dailyHint.textContent = t("hint_daily",{ s:fmtCost(dailyCost()), l: lim>0 ? fmtCost(lim) : t("daily_unlim") }); }

// ---------- secret memory of recent chats ----------
function loadMemory(){ try{ return JSON.parse(store.get("memory","[]")) || []; }catch(_){ return []; } }
function saveMemory(arr){ store.set("memory", JSON.stringify(arr.slice(-10))); }
function clip(s){ s=(s||"").trim().replace(/\s+/g," "); return s.length>140 ? s.slice(0,140)+"…" : s; }
let pendingTurn = null;
function rememberUser(q){ q=clip(q); if(!q) return; pendingTurn = { q, a:"" }; }
function rememberHero(a){
  a=clip(a); if(!a && !pendingTurn) return;
  if(!pendingTurn) pendingTurn = { q:"", a };
  else pendingTurn.a = a;
  const mem = loadMemory(); mem.push(pendingTurn); saveMemory(mem);
  pendingTurn = null; updateMemHint();
}
function memoryBlock(){
  const mem = loadMemory();
  if(!mem.length) return "";
  const who = lang==="de" ? "Kind" : "Child";
  const lines = mem.map(m => `- ${who}: ${m.q||"…"}${m.a ? `  → Senua: ${m.a}` : ""}`).join("\n");
  if(lang==="de")
    return `\n\n## Geheimes Gedächtnis (NICHT vorlesen)\nKurze Zusammenfassung eurer letzten Gespräche. Knüpfe natürlich daran an, lies es aber niemals laut vor:\n${lines}`;
  return `\n\n## Secret memory (do NOT read aloud)\nA short summary of your recent chats. Pick up on it naturally, but never read it out loud:\n${lines}`;
}

let dockShift=0, dragging=false, dragStartX=0, dragStartShift=0, dragMoved=0;
let dragStartY=0, liftEl=null, liftMode=false, teamGhost=null;   // team mode: drag a friend up into the action area
function buildFriends(){
  friendsEl.innerHTML = CHARACTERS.map(c=>
    `<button class="friend" data-id="${c.id}" title="${charRole(c)}">
       <span class="av" style="background:${c.body}">${c.emoji}</span>
       <span class="nm">${charName(c)}</span>
     </button>`).join("");
  // swipeable carousel: drag to scroll, the friend in the MIDDLE is the selected one;
  // a tap (no real movement) selects the tapped friend directly.
  friendsEl.onpointerdown = (e)=>{
    dragging=true; dragMoved=0; liftMode=false; dragStartX=e.clientX; dragStartY=e.clientY; dragStartShift=dockShift;
    liftEl = teamMode ? (e.target.closest && e.target.closest(".friend")) : null;
    try{ friendsEl.setPointerCapture(e.pointerId); }catch(_){}
    friendsEl.style.transition="none";
  };
  friendsEl.onpointermove = (e)=>{
    if(!dragging) return;
    const dx=e.clientX-dragStartX, dy=e.clientY-dragStartY;
    if(!liftMode && teamMode && liftEl && dy < -16 && Math.abs(dy) > Math.abs(dx)){   // upward drag = lift to team
      liftMode=true;
      const c=vById(liftEl.dataset.id)||CHARACTERS[0];
      teamGhost=document.createElement("div"); teamGhost.className="teamghost"; teamGhost.style.background=c.body; teamGhost.textContent=c.emoji;
      document.body.appendChild(teamGhost);
    }
    if(liftMode){ teamGhost.style.left=e.clientX+"px"; teamGhost.style.top=e.clientY+"px"; return; }
    dragMoved=Math.max(dragMoved, Math.abs(dx));
    setShift(dragStartShift+dx);
  };
  const endDrag = (e)=>{
    if(!dragging) return; dragging=false;
    friendsEl.style.transition="";                              // re-enable the smooth snap
    if(liftMode){
      if(teamGhost){ teamGhost.remove(); teamGhost=null; }
      const r=actionAreaRect(), over = e.clientX>=r.left-60 && e.clientX<=r.right+60 && e.clientY>=r.top-60 && e.clientY<=r.bottom+60;
      if(over && liftEl) addTeam(liftEl.dataset.id);            // dropped on the action area → add to team
      liftMode=false; liftEl=null; return;
    }
    let tapEl=null;
    if(dragMoved<6){ const el=document.elementFromPoint(e.clientX, e.clientY); tapEl = el && el.closest ? el.closest(".friend") : null; }
    if(teamMode && tapEl){                                       // team mode: a tap adds that friend to the team
      if(tapEl.dataset.id===currentChar().id) centerFriend(tapEl);   // the hero itself → just recentre
      else addTeam(tapEl.dataset.id);
      return;
    }
    const target = tapEl || nearestFriend();                    // tap → that friend; swipe → nearest to centre
    if(!target) return;
    if(target.dataset.id!==currentChar().id) selectCharacter(target.dataset.id);
    else centerFriend(target);                                  // already selected → snap back to centre
  };
  friendsEl.onpointerup = endDrag;
  friendsEl.onpointercancel = endDrag;
  markActiveFriend();
  centerActiveFriend();
}
// content-coordinate sitting at the row's centre (= the selected slot)
function dockFocus(){ return friendsEl.clientWidth/2 - dockShift; }
// macOS-Dock magnifier — the friend nearest the centre is biggest.
function applyDock(){
  const items=[...friendsEl.querySelectorAll(".friend")];
  if(!items.length) return;
  const focus=dockFocus(), sigma=58, maxBoost=0.5;
  items.forEach(b=>{
    const c=b.offsetLeft+b.offsetWidth/2, d=c-focus;
    const boost=maxBoost*Math.exp(-(d*d)/(2*sigma*sigma));
    const av=b.querySelector(".av");
    av.style.transform=`translateY(${(-14*boost).toFixed(1)}px) scale(${(1+boost).toFixed(3)})`;
    av.style.zIndex = boost>0.06 ? "2" : "1";
  });
}
function setShift(s){ dockShift=s; friendsEl.style.transform=`translateX(${dockShift.toFixed(1)}px)`; applyDock(); }
function nearestFriend(){
  const items=[...friendsEl.querySelectorAll(".friend")]; if(!items.length) return null;
  const focus=dockFocus(); let best=items[0], bd=Infinity;
  items.forEach(b=>{ const d=Math.abs((b.offsetLeft+b.offsetWidth/2)-focus); if(d<bd){bd=d;best=b;} });
  return best;
}
function centerFriend(el){ if(!el) return; setShift(friendsEl.clientWidth/2 - (el.offsetLeft+el.offsetWidth/2)); }
function centerActiveFriend(){ centerFriend(friendsEl.querySelector(".friend.active") || friendsEl.querySelector(".friend")); }

// ---------- team mode (extra characters around the hero) — EXPERIMENTAL ----------
let teamMode = store.get("teammode","0")==="1";
let team = [];   // [{id,x,y}] extra characters laid out around the hero (max 2)
function teamFull(){ return team.length>=2; }
function inTeam(id){ return team.some(m=>m.id===id); }
function randomSpot(){
  const a = Math.random()*Math.PI*2, r = 28 + Math.random()*12;
  return { x: Math.max(14, Math.min(86, 50 + Math.cos(a)*r*1.4)), y: Math.max(16, Math.min(70, 40 + Math.sin(a)*r)) };
}
function addTeam(id){
  if(!teamMode || id===currentChar().id || inTeam(id) || teamFull()) return;
  const s = randomSpot(); team.push({ id, x:s.x, y:s.y }); renderTeam();
}
function removeTeam(id){ team = team.filter(m=>m.id!==id); renderTeam(); }
function renderTeam(){
  if(!teamLayer) return;
  teamLayer.classList.toggle("on", teamMode);
  if(!teamMode){ teamLayer.innerHTML=""; return; }
  team = team.filter(m=>m.id!==currentChar().id);                 // the selected hero is the centre, not a teammate
  teamLayer.innerHTML = team.map(m=>{ const c=vById(m.id)||CHARACTERS[0];
    return `<button class="teammate" data-id="${m.id}" title="${charName(c)}" style="left:${m.x}%; top:${m.y}%; background:${c.body}">${c.emoji}</button>`;
  }).join("");
  teamLayer.querySelectorAll(".teammate").forEach(attachTeammateDrag);
}
function actionAreaRect(){ return (heroSvg.closest(".heroBox")||heroSvg).getBoundingClientRect(); }
function attachTeammateDrag(b){     // drag a teammate out of the action area to remove it
  let sx=0, sy=0, moved=0, dr=false;
  b.onpointerdown=(e)=>{ dr=true; moved=0; sx=e.clientX; sy=e.clientY; try{ b.setPointerCapture(e.pointerId); }catch(_){} b.style.transition="none"; };
  b.onpointermove=(e)=>{ if(!dr) return; const dx=e.clientX-sx, dy=e.clientY-sy; moved=Math.max(moved,Math.abs(dx)+Math.abs(dy)); b.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; };
  const end=(e)=>{ if(!dr) return; dr=false; b.style.transition="";
    const r=actionAreaRect(), inside = e.clientX>=r.left-50 && e.clientX<=r.right+50 && e.clientY>=r.top-50 && e.clientY<=r.bottom+50;
    if(moved>8 && !inside) removeTeam(b.dataset.id); else b.style.transform="translate(-50%,-50%)";
  };
  b.onpointerup=end; b.onpointercancel=end;
}
function setSpeaking(id){ if(teamLayer) teamLayer.querySelectorAll(".teammate").forEach(b=> b.classList.toggle("speaking", b.dataset.id===id)); }
if(teamBtn) teamBtn.onclick=()=>{
  teamMode=!teamMode; store.set("teammode", teamMode?"1":"0");
  teamBtn.classList.toggle("off", !teamMode);
  if(!teamMode) team=[];
  renderTeam();
};
function markActiveFriend(){

function applyCharacter(){

// ---------- deployed version (latest commit touching immune-heroes) ----------
const REPO = "blurayne/claude-experiments", APP_PATH = "immune-heroes";
let verLoaded = false;
async function loadVersion(){
  if(verLoaded) return;
  verEl.textContent = t("ver_checking");
  try{
    const r = await fetch(
      `https://api.github.com/repos/${REPO}/commits?path=${APP_PATH}&per_page=1`,
      { headers: { Accept: "application/vnd.github+json" } });
    if(!r.ok) throw new Error("HTTP " + r.status);
    const [c] = await r.json();
    if(!c) throw new Error("no commits");
    const sha = c.sha.slice(0, 7);
    const when = new Date(c.commit.committer.date);
    const stamp = when.toLocaleString(lang, { dateStyle: "medium", timeStyle: "short" });
    verEl.innerHTML =
      `Version <a href="https://github.com/${REPO}/commit/${c.sha}" target="_blank" rel="noopener"><code>${sha}</code></a> · ${t("ver_lastcommit")} ${stamp}`;
    verLoaded = true;
  }catch(e){
    verEl.textContent = t("ver_unavail") + " (" + (e.message || "offline") + ")";
  }
}

// ---------- password gate for the grown-ups settings ----------
async function sha256hex(s){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
function hasPassword(){ return !!store.get("settings_pw"); }
let pwResolve=null, pwMode="enter";
function openPw(mode){
  pwMode=mode; pwErr.textContent=""; pwInput.value=""; pwConfirm.value="";
  pwConfirmField.style.display = mode==="create" ? "" : "none";
  pwTitle.textContent = t(mode==="create" ? "pw_set_title" : "pw_enter_title");
  pwMsg.textContent   = t(mode==="create" ? "pw_set_msg"   : "pw_enter_msg");
  pwInput.placeholder = t("pw_ph"); pwConfirm.placeholder = t("pw_confirm_ph");
  pwOk.textContent = t("pw_ok"); pwCancel.textContent = t("pw_cancel");
  pwScrim.classList.add("show"); setTimeout(()=>pwInput.focus(), 60);
  return new Promise(res=>{ pwResolve=res; });
}
function closePw(ok){ pwScrim.classList.remove("show"); const r=pwResolve; pwResolve=null; if(r) r(ok); }
async function pwSubmit(){
  const v = pwInput.value;
  if(pwMode==="create"){
    if(v.length<4){ pwErr.textContent=t("pw_short"); return; }
    if(v!==pwConfirm.value){ pwErr.textContent=t("pw_mismatch"); return; }
    store.set("settings_pw", await sha256hex(v));
    closePw(true);
  } else {
    if(await sha256hex(v) === store.get("settings_pw")) closePw(true);
    else { pwErr.textContent=t("pw_wrong"); pwInput.value=""; pwInput.focus(); }
  }
}
pwOk.onclick = pwSubmit;
pwCancel.onclick = ()=>closePw(false);
pwScrim.onclick = (e)=>{ if(e.target===pwScrim) closePw(false); };
pwInput.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); pwSubmit(); } });

// ---------- ElevenLabs voice search ----------
async function searchVoices(){
  const q = voiceSearch.value.trim();
  const key = store.get("eleven_key") || elevenKey.value.trim();
  if(!key){ voiceChosen.textContent = "⚠ " + t("label_eleven_key"); return; }
  voiceSearchBtn.disabled = true;
  try{
    const url = `https://api.elevenlabs.io/v1/shared-voices?page_size=20${q?`&search=${encodeURIComponent(q)}`:""}`;
    const r = await fetch(url, { headers:{ "xi-api-key": key } });
    if(!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();
    const voices = data.voices || [];
    voiceResults.innerHTML = voices.map(v=>`<option value="${v.voice_id}" data-name="${(v.name||"").replace(/"/g,"")}">${v.name}${v.accent?` · ${v.accent}`:""}${v.gender?` · ${v.gender}`:""}</option>`).join("");
    voiceResults.style.display = voices.length ? "" : "none";
    if(!voices.length) voiceChosen.textContent = "—";
  }catch(e){ voiceChosen.textContent = "⚠ " + (e.message||"search failed"); }
  finally{ voiceSearchBtn.disabled = false; }
}
voiceSearchBtn.onclick = searchVoices;
voiceSearch.onkeydown = (e)=>{ if(e.key==="Enter"){ e.preventDefault(); searchVoices(); } };
voiceResults.onchange = ()=>{
  const opt = voiceResults.selectedOptions[0]; if(!opt) return;
  store.set("eleven_voice", opt.value);

  voiceChosen.textContent = "✓ " + (opt.dataset.name || opt.textContent);
};

async function listGeminiModels(){

  if(!key){ geminiModelHint.textContent = "⚠ " + t("label_gemini_key"); return; }
  geminiListBtn.disabled = true;
  geminiModelHint.textContent = t("listing");
  try{
    const found = new Map();   // id -> api version it was found under
    for(const ver of ["v1beta","v1alpha"]){
      let pageToken = "";
      for(let i=0;i<6;i++){
        const url = `https://generativelanguage.googleapis.com/${ver}/models?key=${encodeURIComponent(key)}&pageSize=200${pageToken?`&pageToken=${encodeURIComponent(pageToken)}`:""}`;
        let r; try{ r = await fetch(url); }catch(_){ break; }
        if(!r.ok){
          if(i===0 && ver==="v1beta"){ const b=await r.text().catch(()=> ""); throw new Error("HTTP "+r.status+(b?": "+b.slice(0,120):"")); }
          break;
        }
        const j = await r.json();
        (j.models||[]).forEach(m=>{
          const methods = m.supportedGenerationMethods || m.supportedActions || [];
          if(methods.includes("bidiGenerateContent")){
            const id = (m.name||"").replace(/^models\//,"");
            if(id && !found.has(id)) found.set(id, ver);   // prefer v1beta (queried first)
          }
        });
        pageToken = j.nextPageToken || "";
        if(!pageToken) break;
      }
    }
    const ids = [...found.keys()].sort();
    geminiModels.innerHTML = ids.map(id=>`<option value="${id}" data-ver="${found.get(id)}">${id}${found.get(id)==="v1alpha"?" · v1alpha":""}</option>`).join("");
    geminiModels.style.display = ids.length ? "" : "none";
    geminiModelHint.textContent = ids.length ? t("listing_found",{ n: ids.length }) : t("listing_none");
  }catch(e){
    geminiModels.style.display = "none";
    geminiModelHint.textContent = "⚠ " + (e.message || "failed");
  }finally{ geminiListBtn.disabled = false; }
}

// ---------- audio analysers ----------
function ensureAudioCtx(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended") audioCtx.resume();
  return audioCtx;
}
function makeAnalyser(stream){
  const ctx=ensureAudioCtx();
  const src=ctx.createMediaStreamSource(stream);
  const an=ctx.createAnalyser(); an.fftSize=512; an.smoothingTimeConstant=0.8;
  src.connect(an); // not wired to destination — playback is the <audio> sink
  return an;
}
function rms(an){
  if(!an) return 0;
  const b=new Uint8Array(an.fftSize); an.getByteTimeDomainData(b);
  let s=0; for(let i=0;i<b.length;i++){const v=(b[i]-128)/128; s+=v*v;}
  return Math.sqrt(s/b.length);
}

// ---------- background visualiser: live waveform when there's sound, heartbeat when quiet ----------
// stylised ECG pulse, p in [0,1) -> normalised height (R-spike ~1.0)
function heartbeatShape(p){
  const g=(c,w,h)=> h*Math.exp(-((p-c)*(p-c))/(2*w*w));
  return g(0.40,0.012,0.14) + g(0.47,0.010,-0.22) + g(0.50,0.012,1.0) + g(0.53,0.011,-0.30) + g(0.62,0.030,0.20);
}
let envSm=0, voiceMix=0, mouthRySm=4, prevTs=0, speakHold=0;
function timeData(an){ if(!an) return null; const b=new Uint8Array(an.fftSize); an.getByteTimeDomainData(b); return b; }

// where the hero sits on screen — measured once (and on resize), then cached, so the
// heartbeat line + voice ring stay anchored and never drift while the carousel scrolls.
let heroAnchor = null;
function measureHero(){
  const r = heroSvg.getBoundingClientRect();
  if(r.width) heroAnchor = { x: r.left + r.width/2, y: r.top + r.height/2, rad: (Math.min(r.width, r.height)/2) || 120 };
}
function heroCenter(){ if(!heroAnchor) measureHero(); return heroAnchor || { x: waveW/2, y: waveH*0.5, rad: 120 }; }
function drawWave(time, heroSpeaking, userActive){
  if(!wctx || document.hidden) return;
  const W=waveW, H=waveH;
  wctx.clearRect(0,0,W,H);
  const hc = heroCenter();
  const midY = hc.y;   // the heartbeat line runs through the hero's vertical centre

  // heartbeat LINE (fades in as the voice fades out)
  const hbA=1-voiceMix;
  if(hbA>0.015){
    wctx.globalAlpha=hbA*0.6; wctx.strokeStyle="rgba(255,255,255,0.9)"; wctx.lineWidth=3; wctx.lineJoin="round";
    wctx.beginPath();
    const beats=2, scroll=time*0.13, amp=Math.min(H*0.16,140)*0.95, step=Math.max(2,Math.floor(W/300));
    for(let x=0;x<=W;x+=step){ let u=(x/W)*beats - scroll*beats; u-=Math.floor(u); const y=midY-heartbeatShape(u)*amp; x?wctx.lineTo(x,y):wctx.moveTo(x,y); }
    wctx.stroke(); wctx.globalAlpha=1;
  }

  // voice CIRCLE — a radial oscilloscope hugging the hero
  if(voiceMix>0.015){
    const col = heroSpeaking ? (currentChar().accent||"#bfeee8") : "#bfe0ff";
    const an = heroSpeaking ? sinkAnalyser : (userActive ? micAnalyser : (sinkAnalyser||micAnalyser));
    const buf = timeData(an);
    const base = hc.rad*0.92, amp = hc.rad*(0.10+envSm*0.7);
    const N = buf ? buf.length : 128, pts = 100;
    wctx.lineJoin="round"; wctx.strokeStyle=col;
    wctx.beginPath();
    for(let i=0;i<=pts;i++){
      const f=i/pts, a=f*Math.PI*2 - Math.PI/2;
      const mir = f<0.5 ? f*2 : 2-f*2;            // mirror so the ring closes seamlessly
      const s = buf ? (buf[Math.floor(mir*(N-1))]-128)/128 : Math.sin(i*0.5+time*6)*0.4;
      const rr = base + s*amp, x = hc.x + Math.cos(a)*rr, y = hc.y + Math.sin(a)*rr;
      i?wctx.lineTo(x,y):wctx.moveTo(x,y);
    }
    wctx.closePath();
    wctx.globalAlpha=voiceMix*0.22; wctx.lineWidth=12; wctx.stroke();   // soft glow
    wctx.globalAlpha=voiceMix;      wctx.lineWidth=3.5; wctx.stroke();   // crisp ring
    wctx.globalAlpha=1;
  }
}

// ---------- animation loop (always running: heartbeat ambience + the character reacts to sound) ----------
function frame(ts){
  rafId=requestAnimationFrame(frame);
  const dt = prevTs ? Math.min(0.05,(ts-prevTs)/1000) : 0.016; prevTs=ts;

  const userLvl = (connected && !muted) ? rms(micAnalyser) : 0;
  const heroLvl = connected ? rms(sinkAnalyser) : 0;
  // hysteresis: hold the "speaking" state ~0.2s past each audio dip so the face/glow
  // don't flicker between syllables (which would otherwise restart the bob → jumpy)
  if(heroLvl>0.012 && heroLvl>=userLvl) speakHold = 0.2; else speakHold = Math.max(0, speakHold - dt);
  const heroSpeaking = speakHold>0;
  const userActive = userLvl>0.03;
  const lvl = Math.min(1, Math.max(userLvl,heroLvl)*3.4);

  // smooth the envelope + the voice/heartbeat crossfade so transitions glide
  const target = lvl>0.06 ? 1 : 0;
  voiceMix += (target - voiceMix) * Math.min(1, dt*7);
  envSm    += (lvl    - envSm)    * Math.min(1, dt*12);

  // hero face (only while connected) — ry is eased every frame, the smile/open swap cross-fades via CSS
  if(connected){
    const ryTarget = heroSpeaking ? (3+Math.min(16,heroLvl*46)) : 3;
    mouthRySm += (ryTarget-mouthRySm)*Math.min(1,dt*(heroSpeaking?16:10));
    mouthEl.setAttribute("ry", mouthRySm.toFixed(1));
    mouthEl.style.opacity = heroSpeaking ? "1" : "0";
    smileEl.style.opacity = heroSpeaking ? "0" : "1";
    if(heroSpeaking!==talkingClass){ talkingClass=heroSpeaking; heroBody.classList.toggle("talking",heroSpeaking); }
  }

  drawWave(ts/1000, heroSpeaking, userActive);
}
function startAnim(){ if(!rafId) rafId=requestAnimationFrame(frame); }   // idempotent; the loop runs for the whole session
function stopAnim(){
  // keep the canvas loop alive (heartbeat continues) — just reset the hero's face to idle
  mouthEl.style.opacity="0"; smileEl.style.opacity="1";
  heroBody.classList.remove("talking"); talkingClass=false;
}

// ---------- OpenAI Realtime session config ----------
// OpenAI server-VAD turn detection — higher threshold + longer silence = less sensitive

  balanced: { threshold:0.60, prefix_padding_ms:300, silence_duration_ms:700,  interrupt:true },

let idleTimer=null, inactivityTimer=null;
// Wait at least 10s after the hero's last word before saying anything unprompted.
const IDLE_MIN=10000, IDLE_MAX=18000, INACTIVITY_MS=30000;
function clearInactivity(){ if(inactivityTimer){ clearTimeout(inactivityTimer); inactivityTimer=null; } }
function armInactivity(extra=0){ clearInactivity(); if(!connected) return; inactivityTimer=setTimeout(()=>{ if(connected) hangup(); }, extra + INACTIVITY_MS); }
function cancelIdle(){ if(idleTimer){ clearTimeout(idleTimer); idleTimer=null; } clearInactivity(); }
function scheduleIdle(){
  cancelIdle();
  if(!connected) return;
  // Count the wait from when the hero's audio actually finishes — not from when the
  // response was generated — so a buffered or long answer can't talk over the next nudge.
  const remainingAudio = (playCtx ? Math.max(0, playHead - playCtx.currentTime) : 0) * 1000;
  armInactivity(remainingAudio);   // stop the session after 30s of real silence (even while muted)
  if(muted) return;
  const gap = IDLE_MIN + Math.random()*(IDLE_MAX-IDLE_MIN);
  idleTimer = setTimeout(fireIdle, remainingAudio + gap);
}

// ---------- shared PCM audio plumbing for the WebSocket providers ----------
function b64ToBytes(b64){ const bin=atob(b64); const n=bin.length; const a=new Uint8Array(n); for(let i=0;i<n;i++) a[i]=bin.charCodeAt(i); return a; }
function bytesToB64(bytes){ let s=""; const C=0x8000; for(let i=0;i<bytes.length;i+=C) s+=String.fromCharCode.apply(null, bytes.subarray(i,i+C)); return btoa(s); }
let capCtx=null, capProc=null, capSrc=null, playCtx=null, playAnalyser=null, playHead=0, playSources=[];
async function startCapture(onChunk){
  localStream = await navigator.mediaDevices.getUserMedia({ audio:{ echoCancellation:true, noiseSuppression:true, autoGainControl:true } });
  capCtx = new (window.AudioContext||window.webkitAudioContext)({ sampleRate:16000 });
  if(capCtx.state==="suspended") await capCtx.resume();
  capSrc = capCtx.createMediaStreamSource(localStream);
  micAnalyser = capCtx.createAnalyser(); micAnalyser.fftSize=512; micAnalyser.smoothingTimeConstant=0.8; capSrc.connect(micAnalyser);
  capProc = capCtx.createScriptProcessor(4096,1,1);
  capProc.onaudioprocess = (e)=>{
    if(muted || !ws || ws.readyState!==1) return;
    const inp = e.inputBuffer.getChannelData(0);
    const pcm = new Int16Array(inp.length);
    for(let i=0;i<inp.length;i++){ const v=Math.max(-1,Math.min(1,inp[i])); pcm[i]= v<0 ? v*0x8000 : v*0x7FFF; }
    onChunk(bytesToB64(new Uint8Array(pcm.buffer)));
  };
  const silent = capCtx.createGain(); silent.gain.value=0;   // keep the processor running without feedback
  capSrc.connect(capProc); capProc.connect(silent); silent.connect(capCtx.destination);
}
function ensurePlay(){
  if(!playCtx){
    playCtx = new (window.AudioContext||window.webkitAudioContext)();
    playAnalyser = playCtx.createAnalyser(); playAnalyser.fftSize=512; playAnalyser.smoothingTimeConstant=0.8;
    playAnalyser.connect(playCtx.destination); sinkAnalyser = playAnalyser; playHead = 0;
  }
  if(playCtx.state==="suspended") playCtx.resume();
}
function playPCM(bytes, rate){
  ensurePlay();
  const n = Math.floor(bytes.byteLength/2);
  const i16 = new Int16Array(bytes.buffer, bytes.byteOffset, n);
  const f32 = new Float32Array(n);
  for(let i=0;i<n;i++) f32[i] = i16[i]/0x8000;
  const buf = playCtx.createBuffer(1, n, rate);
  buf.copyToChannel(f32, 0);
  const src = playCtx.createBufferSource(); src.buffer = buf; src.connect(playAnalyser);
  const start = Math.max(playCtx.currentTime, playHead);
  src.start(start); playHead = start + buf.duration;
  playSources.push(src); src.onended = ()=>{ playSources = playSources.filter(s=>s!==src); };
}
function clearPlayback(){ playSources.forEach(s=>{ try{ s.stop(); }catch(_){} }); playSources=[]; if(playCtx) playHead = playCtx.currentTime; }
function stopPcm(){
  try{ if(capProc){ capProc.onaudioprocess=null; capProc.disconnect(); } }catch(_){}
  try{ if(capSrc) capSrc.disconnect(); }catch(_){}
  try{ if(capCtx) capCtx.close(); }catch(_){}
  capCtx=capProc=capSrc=null;
  clearPlayback();
  try{ if(playCtx) playCtx.close(); }catch(_){}
  playCtx=null; playAnalyser=null;
}

// ---------- connect / hangup ----------
async function connect(){
  if(dailyLimitReached()){ showTimesUp(); return; }
  const p = curProvider();
  if(!providerKeyPresent(p)){ gateSettings(); return; }
  if(connecting||connected) return;
  hideError(); connecting=true; talkBtn.disabled=true; setStatus(t("waking"));
  try{
    if(p==="gemini") await connectGemini();
    else if(p==="elevenlabs") await connectEleven();

  }
}

// ---------- OpenAI Realtime (WebRTC) ----------
async function connectOpenAI(){
  const key=store.get("key");
  pc=new RTCPeerConnection();
  pc.ontrack=(e)=>{ const stream=e.streams[0]; $("sink").srcObject=stream; try{ sinkAnalyser=makeAnalyser(stream); }catch(_){} };
  localStream=await navigator.mediaDevices.getUserMedia({ audio:{ echoCancellation:true, noiseSuppression:true, autoGainControl:true } });
  pc.addTrack(localStream.getAudioTracks()[0], localStream);
  try{ micAnalyser=makeAnalyser(localStream); }catch(_){}
  dc=pc.createDataChannel("oai-events");
  dc.addEventListener("open", ()=>{ sendSessionConfig(); onConnected(); greetNow(); });
  dc.addEventListener("message", onEvent);
  dc.addEventListener("close", ()=>{ if(connected) hangup(); });
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  const model=store.get("model", DEFAULTS.model);
  const resp=await fetch(`https://api.openai.com/v1/realtime/calls?model=${encodeURIComponent(model)}`, {
    method:"POST", body:offer.sdp,
    headers:{ Authorization:`Bearer ${key}`, "Content-Type":"application/sdp" } });
  if(!resp.ok){ const body=await resp.text(); const e=new Error(`OpenAI ${resp.status}: ${body.slice(0,200)}`); e.status=resp.status; throw e; }
  await pc.setRemoteDescription({ type:"answer", sdp: await resp.text() });
}

// ---------- Google Gemini Live (WebSocket, native speech-to-speech) ----------
const GEMINI_VOICE = { senua:"Aoede", rubina:"Leda", theo:"Charon", kilian:"Fenrir", denni:"Puck", makro:"Orus", bea:"Kore", hela:"Zephyr", pia:"Aoede" };
async function connectGemini(){
  const key=store.get("gemini_key");
  const model=store.get("gemini_model", DEFAULTS.gemini_model);
  const ver=store.get("gemini_apiver","v1beta");   // some newer Live models only exist on v1alpha
  ws = new WebSocket(`wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.${ver}.GenerativeService.BidiGenerateContent?key=${encodeURIComponent(key)}`);
  let turnText="";
  ws.onopen = ()=>{
    ws.send(JSON.stringify({ setup:{
      model: `models/${model}`,
      generationConfig:{ responseModalities:["AUDIO"], speechConfig:{ voiceConfig:{ prebuiltVoiceConfig:{ voiceName: GEMINI_VOICE[currentChar().id]||"Aoede" } } } },
      systemInstruction:{ parts:[{ text: fullInstructions() }] },
      inputAudioTranscription:{}, outputAudioTranscription:{},
      tools:[{ functionDeclarations:[{ name:"remember_friend", description: REMEMBER_TOOL_DESC,
        parameters:{ type:"OBJECT", properties:{ name:{type:"STRING"}, cell_type:{type:"STRING"}, trait:{type:"STRING"} }, required:["name","cell_type","trait"] } }] }],
    }}));
  };
  ws.onmessage = async (e)=>{
    let msg; try{ msg = JSON.parse(e.data instanceof Blob ? await e.data.text() : e.data); }catch(_){ return; }
    if(msg.usageMetadata) accrueGemini(msg.usageMetadata);
    if(msg.setupComplete){
      try{ await startCapture((b64)=>{ if(ws&&ws.readyState===1) ws.send(JSON.stringify({ realtimeInput:{ mediaChunks:[{ mimeType:"audio/pcm;rate=16000", data:b64 }] } })); }); }
      catch(err){ handleConnectError(err); cleanup(); connecting=false; talkBtn.disabled=false; return; }
      ensurePlay(); onConnected(); greetNow(); return;
    }
    if(msg.toolCall && msg.toolCall.functionCalls){
      const resps=[];
      for(const fc of msg.toolCall.functionCalls){ const a=fc.args||{}; rosterAdd(a.name, a.cell_type, a.trait); resps.push({ id:fc.id, name:fc.name, response:{ result:"ok" } }); }
      try{ ws.send(JSON.stringify({ toolResponse:{ functionResponses: resps } })); }catch(_){}
      return;
    }
    const sc = msg.serverContent;
    if(sc){
      if(sc.interrupted) clearPlayback();
      if(sc.inputTranscription && sc.inputTranscription.text){ uiUserStart(); kidText+=sc.inputTranscription.text; showSay("kid", kidText); }
      if(sc.outputTranscription && sc.outputTranscription.text){ if(!turnText) uiRespStart(); turnText+=sc.outputTranscription.text; showSay("hero", turnText); }
      const parts = sc.modelTurn && sc.modelTurn.parts;
      if(parts) for(const part of parts){ if(part.inlineData && part.inlineData.data) playPCM(b64ToBytes(part.inlineData.data), 24000); }
      if(sc.turnComplete){ if(kidText){ rememberUser(kidText); kidText=""; } if(turnText){ rememberHero(turnText); turnText=""; } uiRespDone(); }
    }
  };
  ws.onerror = ()=>{};
  ws.onclose = (e)=>{
    if(connecting && !connected){ handleConnectError(new Error("Gemini connection closed"+(e.code?` (${e.code})`:"")+(e.reason?": "+e.reason:""))); connecting=false; talkBtn.disabled=false; }
    else if(connected) hangup();
  };
}

// ---------- ElevenLabs Conversational AI agent (WebSocket) ----------
async function connectEleven(){
  const key=store.get("eleven_key"), agent=store.get("eleven_agent");
  const r = await fetch(`https://api.elevenlabs.io/v1/convai/conversation/get-signed-url?agent_id=${encodeURIComponent(agent)}`, { headers:{ "xi-api-key": key } });
  if(!r.ok){ const b=await r.text(); const e=new Error(`ElevenLabs ${r.status}: ${b.slice(0,160)}`); e.status=r.status; throw e; }
  const { signed_url } = await r.json();
  ws = new WebSocket(signed_url);
  ws.onopen = ()=>{
    const voiceId = store.get("eleven_voice");
    const ov = { type:"conversation_initiation_client_data",
      conversation_config_override:{ agent:{ prompt:{ prompt: fullInstructions() }, language: lang } } };
    if(voiceId) ov.conversation_config_override.tts = { voice_id: voiceId };
    ws.send(JSON.stringify(ov));
  };
  ws.onmessage = async (e)=>{
    let msg; try{ msg = JSON.parse(e.data instanceof Blob ? await e.data.text() : e.data); }catch(_){ return; }
    const ty = msg.type;
    if(ty==="conversation_initiation_metadata"){
      try{ await startCapture((b64)=>{ if(ws&&ws.readyState===1) ws.send(JSON.stringify({ user_audio_chunk: b64 })); }); }
      catch(err){ handleConnectError(err); cleanup(); connecting=false; talkBtn.disabled=false; return; }
      ensurePlay(); onConnected(); return;   // the agent's first_message greets automatically
    }
    if(ty==="ping"){ try{ ws.send(JSON.stringify({ type:"pong", event_id:(msg.ping_event||{}).event_id })); }catch(_){} return; }
    if(ty==="audio"){ const b64=(msg.audio_event||{}).audio_base_64; if(b64){ uiRespStart(); playPCM(b64ToBytes(b64), 16000); } return; }
    if(ty==="user_transcript"){ const txt=(msg.user_transcription_event||{}).user_transcript||""; uiUserStart(); showSay("kid", txt); if(txt) rememberUser(txt); return; }
    if(ty==="agent_response"){ const txt=(msg.agent_response_event||{}).agent_response||""; if(txt){ showSay("hero", txt); rememberHero(txt); } uiRespDone(); return; }
    if(ty==="interruption"){ clearPlayback(); return; }
  };
  ws.onerror = ()=>{};
  ws.onclose = (e)=>{
    if(connecting && !connected){ handleConnectError(new Error("ElevenLabs connection closed"+(e.code?` (${e.code})`:""))); connecting=false; talkBtn.disabled=false; }
    else if(connected) hangup();
  };
}
function onConnected(){
  connecting=false; connected=true; talkBtn.disabled=false; hideError();
  talkBtn.classList.add("live"); talkBtn.innerHTML=t("talk_live");
  muteBtn.hidden=false;
  setStatus(t("listening_full"));
  showSay("hero", t("greeting"));
  startAnim();
  scheduleIdle();
  acquireWakeLock();
  if(curProvider()==="elevenlabs") elevenStartMeter();   // ElevenLabs bills per minute → meter live
}
function hangup(){
  cleanup(); connected=false; connecting=false;
  talkBtn.classList.remove("live"); talkBtn.innerHTML=t("talk_idle"); talkBtn.disabled=false;
  muteBtn.hidden=true; muted=false; setMuteVisual();
  liveText=""; setStatus(t("bye"));
  stopAnim();
}
function cleanup(){
  cancelIdle();
  cancelYourTurn();
  elevenCommit();        // bank any ElevenLabs minutes before tearing down
  resetGeminiMeter();    // next Gemini session starts its cumulative meter fresh
  releaseWakeLock();
  try{ if(dc) dc.close(); }catch(_){}
  try{ if(pc){ pc.getSenders().forEach(s=>s.track&&s.track.stop()); pc.close(); } }catch(_){}
  try{ if(ws){ ws.onclose=null; ws.onmessage=null; ws.onerror=null; ws.close(); } }catch(_){}
  try{ if(localStream) localStream.getTracks().forEach(t=>t.stop()); }catch(_){}
  try{ const sk=$("sink"); if(sk){ sk.pause(); sk.srcObject=null; } }catch(_){}   // stop the old voice immediately
  clearPlayback();
  stopPcm();
  dc=null; pc=null; ws=null; localStream=null; micAnalyser=sinkAnalyser=null; heroText=kidText="";
}

// ---------- realtime events (match defensively across beta/GA names) ----------
function onEvent(e){
  let ev; try{ ev=JSON.parse(e.data); }catch(_){ return; }
  const ty=ev.type||"";

  if(ty==="error" || ty.endsWith(".error")){
    const msg=(ev.error&&(ev.error.message||ev.error.code))||"Unknown realtime error";
    console.warn("realtime error:", ev);
    if(/voice/i.test(msg)){ /* changing voice mid-response is benign */ }
    else if(/quota|billing|insufficient/i.test(msg))
      showError(msg, { title: t("err_quota_title"), link: { label: t("link_billing"), href: BILLING_URL } });
    else showError(msg);
    return;
  }

  // the model invented a friend -> save it, return a result so it keeps talking
  if(ty.endsWith("function_call_arguments.done")){
    try{ const a=JSON.parse(ev.arguments||"{}"); rosterAdd(a.name, a.cell_type, a.trait); }catch(_){}
    if(ev.call_id && dc && dc.readyState==="open"){ try{
      dc.send(JSON.stringify({ type:"conversation.item.create", item:{ type:"function_call_output", call_id:ev.call_id, output:'{"ok":true}' } }));
      dc.send(JSON.stringify({ type:"response.create" }));
    }catch(_){} }
    return;
  }

  if(ty.includes("input_audio_transcription")){
    if(ty.endsWith("delta") && ev.delta){ kidText+=ev.delta; showSay("kid", kidText); }
    else if(ty.endsWith("completed")||ty.endsWith("done")){ const q=ev.transcript||kidText; rememberUser(q); kidText=""; armYourTurn(); }
    return;
  }
  if(ty.includes("output_audio_transcript")||ty.includes("audio_transcript")||ty.includes("output_text")){
    if(ty.endsWith("delta") && ev.delta){ heroText+=ev.delta; showSay("hero", heroText); }
    else if(ty.endsWith("done")){ const a=ev.transcript||heroText; rememberHero(a); heroText=""; armYourTurn(); }
    return;
  }

  switch(ty){
    case "input_audio_buffer.speech_started": cancelIdle(); setStatus(t("listening")); break;
    case "input_audio_buffer.speech_stopped": setStatus(t("thinking")); break;
    case "response.created": cancelIdle(); heroText=""; setStatus(t("talking")); break;
    case "response.done":
      if(ev.response && ev.response.usage){
        const u=ev.response.usage;
        if(typeof u.total_tokens==="number") addUsage(u.total_tokens);
        addCost(costFromOpenAI(u));
      }
      if(connected){ armYourTurn(); scheduleIdle(); }
      break;
  }
}

// ---------- switching friends ----------
function selectCharacter(id){
  if(id===currentChar().id) return;
  const wasLive = connected || connecting;
  store.set("char", id);
  applyCharacter();
  if(instrLabel) instrLabel.textContent = t("label_instr",{ c: charName(currentChar()) });
  if(wasLive){
    // fully END the old conversation first (closes the transport, stops its audio), keep the
    // live UI, then start the new character once it's really torn down. A token makes sure only
    // the latest pick connects if you scroll through several friends.
    cleanup(); connected=false; connecting=false;
    setStatus(t("waking"));
    const my = ++switchSeq;
    setTimeout(()=>{ if(my===switchSeq && !connected && !connecting){ ensureAudioCtx(); connect(); } }, 350);
  }
}
let switchSeq = 0;

// ---------- buttons ----------
talkBtn.onclick=()=>{ if(connected) hangup(); else { ensureAudioCtx(); connect(); } };
muteBtn.onclick=()=>{
  if(!localStream) return;
  muted=!muted;
  localStream.getAudioTracks().forEach(tr=>tr.enabled=!muted);
  setMuteVisual();
  if(connected) scheduleIdle();   // re-arms idle + 30s auto-stop (skips the nudge while muted)
};
textBtn.onclick=()=> setShowText(!showText);
window.addEventListener("beforeunload", ()=>{ if(connected) cleanup(); });

// ---------- init ----------
applyLang();
applyCharacter();
if(teamBtn) teamBtn.classList.toggle("off", !teamMode);
renderTeam();
sizeWave();
measureHero(); setTimeout(measureHero, 400);  // anchor the heartbeat/voice ring (re-measure once after layout settles)
startAnim();                                  // heartbeat ambience runs from the start
window.addEventListener("resize", ()=>{ sizeWave(); measureHero(); centerActiveFriend(); });
window.addEventListener("orientationchange", ()=>{ setTimeout(()=>{ sizeWave(); measureHero(); centerActiveFriend(); }, 200); });
sayEl.style.display="none";   // the old caption bubble is retired; transcript shows in the status line
if(!providerKeyPresent()) gateSettings();
</script>
